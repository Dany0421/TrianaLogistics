<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net; img-src 'self' data:;">
<title>Preços Históricos — Procurement</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<style>
  .back-link { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); margin-bottom:20px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; transition:.15s; }
  .back-link:hover { color:var(--accent); }
  .page-title { font-size:22px; font-weight:700; color:#fff; letter-spacing:-.3px; margin-bottom:4px; }
  .page-sub { font-size:13px; color:var(--muted); margin-bottom:24px; }

  .search-bar { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
  .search-input-wrap { position:relative; flex:1; min-width:220px; }
  .search-input-wrap input { width:100%; padding-right:36px; }
  .search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:0; line-height:1; }
  .search-clear:hover { color:var(--text); }

  .date-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
  .date-chip { font-family:'JetBrains Mono',monospace; font-size:11px; padding:5px 12px; border:1px solid var(--border); border-radius:20px; cursor:pointer; color:var(--muted); background:var(--surface); transition:.12s; letter-spacing:.3px; }
  .date-chip:hover { border-color:var(--accent); color:var(--accent); }
  .date-chip.active { border-color:var(--accent); color:var(--accent); background:rgba(59,130,246,.1); }

  .results-info { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:12px; letter-spacing:.3px; }

  .price-table { width:100%; border-collapse:collapse; font-size:13px; }
  .price-table th { text-align:left; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.7px; text-transform:uppercase; padding:8px 12px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .price-table td { padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .price-table tr:hover td { background:rgba(59,130,246,.03); }

  .price-desc { font-size:13px; color:var(--text); }
  .price-part { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); margin-top:2px; }
  .price-supplier { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent); }
  .price-process { font-size:12px; color:var(--muted); cursor:pointer; transition:.12s; text-decoration:none; }
  .price-process:hover { color:var(--accent); }
  .price-amount { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:#fff; white-space:nowrap; }
  .price-currency { font-size:10px; color:var(--muted); margin-left:3px; }
  .price-date { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); white-space:nowrap; }

  .badge-fresh { display:inline-block; background:rgba(16,185,129,.12); color:#34d399; border:1px solid rgba(16,185,129,.25); border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:9px; padding:1px 6px; margin-left:6px; letter-spacing:.5px; vertical-align:middle; }
  .badge-old   { display:inline-block; background:var(--surface2); color:var(--muted); border:1px solid var(--border); border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:9px; padding:1px 6px; margin-left:6px; letter-spacing:.5px; vertical-align:middle; }

  .search-highlight { background:rgba(251,191,36,.2); color:#fcd34d; border-radius:2px; padding:0 1px; }

  .empty-search { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-search .icon { font-size:36px; margin-bottom:12px; opacity:.4; }
  .empty-search .msg { font-size:14px; }
  .empty-search .hint { font-size:12px; margin-top:6px; }
</style>
</head>
<body>

<div class="app-shell">
  <div class="topbar">
    <div class="topbar-brand">Triana · <span>Procurement</span></div>
    <div class="topbar-right" id="topbarRight"></div>
  </div>
  <div class="page-content">

    <div class="back-link" onclick="window.location.href='dashboard.html'">← Dashboard</div>

    <div class="page-title">Base de Preços</div>
    <div class="page-sub">Pesquisa cotações históricas de todos os processos.</div>

    <div class="search-bar">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="Ex: parafuso 8mm, HP 290, cabo UTP..." autocomplete="off"
          onkeydown="if(event.key==='Enter')doSearch()">
        <button class="search-clear" id="clearBtn" onclick="clearSearch()" style="display:none">×</button>
      </div>
      <button class="btn btn-primary" onclick="doSearch()">Pesquisar</button>
    </div>

    <div class="date-chips">
      <div class="date-chip" data-days="7" onclick="setDateChip(this, 7)">1 Semana</div>
      <div class="date-chip" data-days="14" onclick="setDateChip(this, 14)">2 Semanas</div>
      <div class="date-chip active" data-days="30" onclick="setDateChip(this, 30)">1 Mês</div>
      <div class="date-chip" data-days="90" onclick="setDateChip(this, 90)">3 Meses</div>
      <div class="date-chip" data-days="0" onclick="setDateChip(this, 0)">Tudo</div>
    </div>

    <div class="results-info" id="resultsInfo"></div>
    <div id="resultsArea">
      <div class="empty-search">
        <div class="icon">🔍</div>
        <div class="msg">Pesquisa por material, equipamento ou referência.</div>
        <div class="hint">Usa palavras-chave — não precisas do nome exato.</div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
let activeDays = 30;
let lastQuery = '';

window.addEventListener('load', async () => {
  if (hasRole('commercial')) { window.location.href = 'dashboard.html'; return; }
  await requireAuth('index.html');
  document.getElementById('topbarRight').innerHTML = renderUserChip();
  document.getElementById('searchInput').addEventListener('input', () => {
    document.getElementById('clearBtn').style.display = document.getElementById('searchInput').value ? '' : 'none';
  });
});

function setDateChip(el, days) {
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeDays = days;
  if (lastQuery !== '') doSearch();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  lastQuery = '';
  document.getElementById('resultsInfo').textContent = '';
  document.getElementById('resultsArea').innerHTML = `
    <div class="empty-search">
      <div class="icon">🔍</div>
      <div class="msg">Pesquisa por material, equipamento ou referência.</div>
      <div class="hint">Usa palavras-chave — não precisas do nome exato.</div>
    </div>`;
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  lastQuery = q;

  let dateFrom = null;
  if (activeDays > 0) {
    const d = new Date();
    d.setDate(d.getDate() - activeDays);
    dateFrom = d.toISOString();
  }

  const info = document.getElementById('resultsInfo');
  info.textContent = 'A pesquisar…';
  document.getElementById('resultsArea').innerHTML = '';

  try {
    const results = await API.searchPriceHistory(q, dateFrom);
    renderResults(results, q);
  } catch(e) {
    info.textContent = '';
    document.getElementById('resultsArea').innerHTML = `<div class="empty-search"><div class="msg" style="color:var(--danger)">${esc(e.message)}</div></div>`;
  }
}

function renderResults(data, query) {
  const info = document.getElementById('resultsInfo');
  const area = document.getElementById('resultsArea');
  const now = new Date();
  const thirtyDaysAgo = new Date(now - 30 * 86400000);

  if (!data.length) {
    info.textContent = '';
    area.innerHTML = `
      <div class="empty-search">
        <div class="icon">📭</div>
        <div class="msg">Sem resultados${query ? ` para "<strong style="color:#fff">${esc(query)}</strong>"` : ''} neste período.</div>
        <div class="hint">Tenta alargar o intervalo de datas ou usar outras palavras-chave.</div>
      </div>`;
    return;
  }

  info.textContent = `${data.length} resultado${data.length !== 1 ? 's' : ''}${query ? ` para "${query}"` : ''}`;

  let html = `<div style="overflow-x:auto"><table class="price-table">
    <thead><tr>
      <th>Descrição</th>
      <th>Fornecedor</th>
      <th>Processo</th>
      <th style="text-align:right">Preço</th>
      <th>Data</th>
    </tr></thead>
    <tbody>`;

  for (const row of data) {
    const supplier = row.suppliers;
    const proc = supplier?.processes;
    const isRecent = row.created_at && new Date(row.created_at) >= thirtyDaysAgo;
    const procId = proc?.id;
    const procLink = procId ? `<a class="price-process" href="process.html?id=${esc(procId)}">${esc((proc.project_name||'') + (proc.client_name ? ' · ' + proc.client_name : ''))}</a>` : '<span style="color:#334">—</span>';
    const desc = query ? highlight(row.raw_description || '', query) : esc(row.raw_description || '');

    html += `<tr>
      <td>
        <div class="price-desc">${desc}</div>
        ${row.raw_part_number ? `<div class="price-part">${esc(row.raw_part_number)}</div>` : ''}
      </td>
      <td><span class="price-supplier">${esc(supplier?.name || '—')}</span></td>
      <td>${procLink}</td>
      <td style="text-align:right">
        <span class="price-amount">${fmtPrice(row.price)}</span>
        <span class="price-currency">${esc(row.currency || '')}</span>
      </td>
      <td>
        <span class="price-date">${fmtDate(row.created_at)}</span>
        <span class="${isRecent ? 'badge-fresh' : 'badge-old'}">${isRecent ? 'RECENTE' : 'ANTIGO'}</span>
      </td>
    </tr>`;
  }

  html += '</tbody></table></div>';
  document.getElementById('resultsArea').innerHTML = html;
}

function highlight(text, query) {
  if (!query) return esc(text);
  const safe = esc(text);
  const safeQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp(safeQ.replace(/ /g, '|'), 'gi'), m => `<span class="search-highlight">${m}</span>`);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('pt-PT'); }
function fmtPrice(p) { if (p == null) return '—'; return new Intl.NumberFormat('pt-PT', { minimumFractionDigits:2, maximumFractionDigits:2 }).format(p); }
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = isError ? 'var(--danger)' : 'var(--text)';
  el.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--accent)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
</body>
</html>
