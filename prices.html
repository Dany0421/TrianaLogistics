<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net; img-src 'self' data:;">
<title>Preços Históricos — Procurement</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@1.8.0/dist/umd/lucide.min.js" integrity="sha384-+8nbzwDAyu5kAjqtR/XKxIgPHQD2TflvbZgeDZn5t3JP+OOogNH1jXnfel8ZAgzS" crossorigin="anonymous"></script>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<style>
  .back-link { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); margin-bottom:20px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; transition:.15s; }
  .back-link:hover { color:var(--accent); }
  .page-title { font-size:22px; font-weight:700; color:#fff; letter-spacing:-.3px; margin-bottom:4px; }
  .page-sub { font-size:13px; color:var(--muted); margin-bottom:24px; }

  .search-bar { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
  .search-input-wrap { position:relative; flex:1; min-width:220px; }
  .search-input-wrap input { width:100%; padding-right:36px; }
  .search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:0; line-height:1; }
  .search-clear:hover { color:var(--text); }

  .date-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
  .date-chip { font-family:'DM Mono',monospace; font-size:11px; padding:5px 12px; border:1px solid var(--border); border-radius:20px; cursor:pointer; color:var(--muted); background:var(--surface); transition:.12px; letter-spacing:.3px; }
  .date-chip:hover { border-color:var(--accent); color:var(--accent); }
  .date-chip.active { border-color:var(--accent); color:var(--accent); background:rgba(37,99,235,.1); }

  .results-info { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:12px; letter-spacing:.3px; }

  .price-table { width:100%; border-collapse:collapse; font-size:13px; }
  .price-table th { text-align:left; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.7px; text-transform:uppercase; padding:8px 12px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .price-table td { padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .price-table tr:hover td { background:rgba(37,99,235,.03); }

  .price-desc { font-size:13px; color:var(--text); }
  .price-part { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:2px; }
  .price-raw { font-size:11px; color:var(--muted); font-style:italic; margin-top:2px; line-height:1.4; }
  .price-supplier { font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); }
  .price-process { font-size:12px; color:var(--muted); cursor:pointer; transition:.12s; text-decoration:none; }
  .price-process:hover { color:var(--accent); }
  .price-amount { font-family:'DM Mono',monospace; font-size:13px; font-weight:600; color:#fff; white-space:nowrap; }
  .price-currency { font-size:10px; color:var(--muted); margin-left:3px; }
  .price-date { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); white-space:nowrap; }

  .badge-fresh { display:inline-block; background:rgba(16,185,129,.12); color:#34d399; border:1px solid rgba(16,185,129,.25); border-radius:4px; font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; margin-left:6px; letter-spacing:.5px; vertical-align:middle; }
  .badge-old   { display:inline-block; background:var(--surface2); color:var(--muted); border:1px solid var(--border); border-radius:4px; font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; margin-left:6px; letter-spacing:.5px; vertical-align:middle; }
  .badge-stale { display:inline-block; background:rgba(239,68,68,.12); color:#f87171; border:1px solid rgba(239,68,68,.25); border-radius:4px; font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; margin-left:6px; letter-spacing:.5px; vertical-align:middle; }
  .badge-bom   { display:inline-block; background:rgba(37,99,235,.12); color:var(--accent); border:1px solid rgba(37,99,235,.25); border-radius:4px; font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; margin-left:6px; letter-spacing:.5px; vertical-align:middle; }
  .btn-filter-match { font-family:'DM Mono',monospace; font-size:11px; padding:6px 14px; border:1px solid var(--border); border-radius:6px; cursor:pointer; color:var(--muted); background:var(--surface); transition:.12s; letter-spacing:.3px; white-space:nowrap; }
  .btn-filter-match:hover { border-color:var(--accent); color:var(--accent); }
  .btn-filter-match.active { border-color:var(--accent); color:var(--accent); background:rgba(37,99,235,.1); }

  .search-highlight { background:rgba(251,191,36,.2); color:#fcd34d; border-radius:2px; padding:0 1px; }

  .empty-search { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-search .icon { font-size:36px; margin-bottom:12px; opacity:.4; }
  .empty-search .msg { font-size:14px; }
  .empty-search .hint { font-size:12px; margin-top:6px; }
</style>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="appSidebar"></aside>
  <div class="main-area">
    <div class="page-content">

    <div class="back-link">← Dashboard</div>

    <div class="page-title">Base de Preços</div>
    <div class="page-sub">Pesquisa cotações históricas de todos os processos.</div>

    <div class="search-bar">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="Ex: parafuso 8mm, HP 290, cabo UTP..." autocomplete="off">
        <button class="search-clear" id="clearBtn" style="display:none">×</button>
      </div>
      <button class="btn btn-primary">Pesquisar</button>
      <button class="btn-filter-match" id="filterMatchBtn">Só com match</button>
    </div>

    <div class="date-chips">
      <div class="date-chip" data-days="7">1 Semana</div>
      <div class="date-chip" data-days="14">2 Semanas</div>
      <div class="date-chip active" data-days="30">1 Mês</div>
      <div class="date-chip" data-days="90">3 Meses</div>
      <div class="date-chip" data-days="0">Tudo</div>
    </div>

    <div class="results-info" id="resultsInfo"></div>
    <div id="resultsArea">
      <div class="empty-search">
        <div class="icon">🔍</div>
        <div class="msg">Pesquisa por material, equipamento ou referência.</div>
        <div class="hint">Usa palavras-chave — não precisas do nome exato.</div>
      </div>
    </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script src="js/prices-page.js"></script>
</body>
</html>
