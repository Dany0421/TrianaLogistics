<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net; img-src 'self' data:;">
<title>Preços Históricos — Procurement</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<style>
  .back-link { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); margin-bottom:20px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; transition:.15s; }
  .back-link:hover { color:var(--accent); }
  .page-title { font-size:22px; font-weight:700; color:#fff; letter-spacing:-.3px; margin-bottom:4px; }
  .page-sub { font-size:13px; color:var(--muted); margin-bottom:24px; }

  .search-bar { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
  .search-input-wrap { position:relative; flex:1; min-width:220px; }
  .search-input-wrap input { width:100%; padding-right:36px; }
  .search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:0; line-height:1; }
  .search-clear:hover { color:var(--text); }

  .date-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
  .date-chip { font-family:'DM Mono',monospace; font-size:11px; padding:5px 12px; border:1px solid var(--border); border-radius:20px; cursor:pointer; color:var(--muted); background:var(--surface); transition:.12s; letter-spacing:.3px; }
  .date-chip:hover { border-color:var(--accent); color:var(--accent); }
  .date-chip.active { border-color:var(--accent); color:var(--accent); background:rgba(37,99,235,.1); }

  .results-info { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:12px; letter-spacing:.3px; }

  .price-table { width:100%; border-collapse:collapse; font-size:13px; }
  .price-table th { text-align:left; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.7px; text-transform:uppercase; padding:8px 12px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .price-table td { padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .price-table tr:hover td { background:rgba(37,99,235,.03); }

  .price-desc { font-size:13px; color:var(--text); }
  .price-part { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:2px; }
  .price-supplier { font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); }
  .price-process { font-size:12px; color:var(--muted); cursor:pointer; transition:.12s; text-decoration:none; }
  .price-process:hover { color:var(--accent); }
  .price-amount { font-family:'DM Mono',monospace; font-size:13px; font-weight:600; color:#fff; white-space:nowrap; }
  .price-currency { font-size:10px; color:var(--muted); margin-left:3px; }
  .price-date { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); white-space:nowrap; }

  .badge-fresh { display:inline-block; background:rgba(16,185,129,.12); color:#34d399; border:1px solid rgba(16,185,129,.25); border-radius:4px; font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; margin-left:6px; letter-spacing:.5px; vertical-align:middle; }
  .badge-old   { display:inline-block; background:var(--surface2); color:var(--muted); border:1px solid var(--border); border-radius:4px; font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; margin-left:6px; letter-spacing:.5px; vertical-align:middle; }

  .search-highlight { background:rgba(251,191,36,.2); color:#fcd34d; border-radius:2px; padding:0 1px; }

  .empty-search { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-search .icon { font-size:36px; margin-bottom:12px; opacity:.4; }
  .empty-search .msg { font-size:14px; }
  .empty-search .hint { font-size:12px; margin-top:6px; }
</style>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="appSidebar"></aside>
  <div class="main-area">
    <div class="page-content">

    <div class="back-link" onclick="window.location.href='dashboard.html'">← Dashboard</div>

    <div class="page-title">Base de Preços</div>
    <div class="page-sub">Pesquisa cotações históricas de todos os processos.</div>

    <div class="search-bar">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="Ex: parafuso 8mm, HP 290, cabo UTP..." autocomplete="off"
          onkeydown="if(event.key==='Enter')doSearch()">
        <button class="search-clear" id="clearBtn" onclick="clearSearch()" style="display:none">×</button>
      </div>
      <button class="btn btn-primary" onclick="doSearch()">Pesquisar</button>
    </div>

    <div class="date-chips">
      <div class="date-chip" data-days="7" onclick="setDateChip(this, 7)">1 Semana</div>
      <div class="date-chip" data-days="14" onclick="setDateChip(this, 14)">2 Semanas</div>
      <div class="date-chip active" data-days="30" onclick="setDateChip(this, 30)">1 Mês</div>
      <div class="date-chip" data-days="90" onclick="setDateChip(this, 90)">3 Meses</div>
      <div class="date-chip" data-days="0" onclick="setDateChip(this, 0)">Tudo</div>
    </div>

    <div class="results-info" id="resultsInfo"></div>
    <div id="resultsArea">
      <div class="empty-search">
        <div class="icon">🔍</div>
        <div class="msg">Pesquisa por material, equipamento ou referência.</div>
        <div class="hint">Usa palavras-chave — não precisas do nome exato.</div>
      </div>
    </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let activeDays = 30;
let lastQuery = '';

window.addEventListener('load', async () => {
  if (hasRole('commercial')) { window.location.href = 'dashboard.html'; return; }
  await requireAuth('index.html');
  mountSidebar(document.getElementById('appSidebar'));
  document.getElementById('searchInput').addEventListener('input', () => {
    document.getElementById('clearBtn').style.display = document.getElementById('searchInput').value ? '' : 'none';
  });
});

function setDateChip(el, days) {
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeDays = days;
  if (lastQuery !== '') doSearch();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  lastQuery = '';
  document.getElementById('resultsInfo').textContent = '';
  const area = document.getElementById('resultsArea');
  area.replaceChildren();
  const wrap = document.createElement('div');
  wrap.className = 'empty-search';
  const ic = document.createElement('div');
  ic.className = 'icon';
  ic.textContent = '\u{1F50D}';
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.textContent = 'Pesquisa por material, equipamento ou referência.';
  const hint = document.createElement('div');
  hint.className = 'hint';
  hint.textContent = 'Usa palavras-chave — não precisas do nome exato.';
  wrap.appendChild(ic);
  wrap.appendChild(msg);
  wrap.appendChild(hint);
  area.appendChild(wrap);
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  lastQuery = q;

  let dateFrom = null;
  if (activeDays > 0) {
    const d = new Date();
    d.setDate(d.getDate() - activeDays);
    dateFrom = d.toISOString();
  }

  const info = document.getElementById('resultsInfo');
  info.textContent = 'A pesquisar…';
  document.getElementById('resultsArea').replaceChildren();

  try {
    const results = await API.searchPriceHistory(q, dateFrom);
    renderResults(results, q);
  } catch(e) {
    info.textContent = '';
    const area = document.getElementById('resultsArea');
    area.replaceChildren();
    const wrap = document.createElement('div');
    wrap.className = 'empty-search';
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.style.color = 'var(--danger)';
    msg.textContent = e.message;
    wrap.appendChild(msg);
    area.appendChild(wrap);
  }
}

function appendHighlightedDesc(el, text, query) {
  if (!query || !query.trim()) {
    el.textContent = text || '';
    return;
  }
  const s = text || '';
  const safeQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(safeQ.replace(/ /g, '|'), 'gi');
  let last = 0;
  let m;
  while ((m = re.exec(s)) !== null) {
    if (m.index > last) el.appendChild(document.createTextNode(s.slice(last, m.index)));
    const span = document.createElement('span');
    span.className = 'search-highlight';
    span.textContent = m[0];
    el.appendChild(span);
    last = m.index + m[0].length;
    if (m[0].length === 0) re.lastIndex++;
  }
  if (last < s.length) el.appendChild(document.createTextNode(s.slice(last)));
}

function renderResults(data, query) {
  const info = document.getElementById('resultsInfo');
  const area = document.getElementById('resultsArea');
  const now = new Date();
  const thirtyDaysAgo = new Date(now - 30 * 86400000);

  if (!data.length) {
    info.textContent = '';
    area.replaceChildren();
    const wrap = document.createElement('div');
    wrap.className = 'empty-search';
    const ic = document.createElement('div');
    ic.className = 'icon';
    ic.textContent = '\u{1F4ED}';
    const msg = document.createElement('div');
    msg.className = 'msg';
    if (query) {
      msg.appendChild(document.createTextNode('Sem resultados para "'));
      const strong = document.createElement('strong');
      strong.style.color = '#fff';
      strong.textContent = query;
      msg.appendChild(strong);
      msg.appendChild(document.createTextNode('" neste período.'));
    } else {
      msg.textContent = 'Sem resultados neste período.';
    }
    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = 'Tenta alargar o intervalo de datas ou usar outras palavras-chave.';
    wrap.appendChild(ic);
    wrap.appendChild(msg);
    wrap.appendChild(hint);
    area.appendChild(wrap);
    return;
  }

  info.textContent = data.length + ' resultado' + (data.length !== 1 ? 's' : '') + (query ? ' para "' + query + '"' : '');

  const scroll = document.createElement('div');
  scroll.style.overflowX = 'auto';
  const table = document.createElement('table');
  table.className = 'price-table';
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  ['Descrição', 'Fornecedor', 'Processo', 'Preço', 'Data'].forEach((label, i) => {
    const th = document.createElement('th');
    th.textContent = label;
    if (i === 3) th.style.textAlign = 'right';
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  table.appendChild(thead);
  const tbody = document.createElement('tbody');

  for (const row of data) {
    const supplier = row.suppliers;
    const proc = supplier?.processes;
    const isRecent = row.created_at && new Date(row.created_at) >= thirtyDaysAgo;
    const procId = proc?.id;
    const tr = document.createElement('tr');
    const tdDesc = document.createElement('td');
    const bomItem = row.item_matches?.[0]?.bom_items;
    const displayDesc = bomItem?.custom_description || bomItem?.description || row.raw_description || '';
    const displayPart = bomItem?.part_number || row.raw_part_number || null;
    const descDiv = document.createElement('div');
    descDiv.className = 'price-desc';
    appendHighlightedDesc(descDiv, displayDesc, query);
    tdDesc.appendChild(descDiv);
    if (displayPart) {
      const part = document.createElement('div');
      part.className = 'price-part';
      part.textContent = displayPart;
      tdDesc.appendChild(part);
    }
    const tdSupp = document.createElement('td');
    const supSpan = document.createElement('span');
    supSpan.className = 'price-supplier';
    supSpan.textContent = supplier?.name || '—';
    tdSupp.appendChild(supSpan);
    const tdProc = document.createElement('td');
    if (procId) {
      const a = document.createElement('a');
      a.className = 'price-process';
      a.href = 'process.html?id=' + procId;
      a.textContent = (proc.project_name || '') + (proc.client_name ? ' · ' + proc.client_name : '');
      tdProc.appendChild(a);
    } else {
      const sp = document.createElement('span');
      sp.style.color = '#334';
      sp.textContent = '\u2014';
      tdProc.appendChild(sp);
    }
    const tdPrice = document.createElement('td');
    tdPrice.style.textAlign = 'right';
    const amt = document.createElement('span');
    amt.className = 'price-amount';
    amt.textContent = fmtPrice(row.price);
    const cur = document.createElement('span');
    cur.className = 'price-currency';
    cur.textContent = row.currency || '';
    tdPrice.appendChild(amt);
    tdPrice.appendChild(cur);
    const tdDate = document.createElement('td');
    const dspan = document.createElement('span');
    dspan.className = 'price-date';
    dspan.textContent = fmtDate(row.created_at);
    const badge = document.createElement('span');
    badge.className = isRecent ? 'badge-fresh' : 'badge-old';
    badge.textContent = isRecent ? 'RECENTE' : 'ANTIGO';
    tdDate.appendChild(dspan);
    tdDate.appendChild(document.createTextNode(' '));
    tdDate.appendChild(badge);
    tr.appendChild(tdDesc);
    tr.appendChild(tdSupp);
    tr.appendChild(tdProc);
    tr.appendChild(tdPrice);
    tr.appendChild(tdDate);
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  scroll.appendChild(table);
  area.replaceChildren();
  area.appendChild(scroll);
}

function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('pt-PT'); }
function fmtPrice(p) {
  if (p == null || p === '') return '—';
  let n;
  if (typeof p === 'number') { n = p; }
  else {
    const t = String(p).trim().replace(/\s/g, '');
    if (/,\d+$/.test(t) && t.lastIndexOf(',') > t.lastIndexOf('.'))
      n = parseFloat(t.replace(/\./g, '').replace(',', '.'));
    else if (/\.\d+$/.test(t) && t.lastIndexOf('.') > t.lastIndexOf(','))
      n = parseFloat(t.replace(/,/g, ''));
    else
      n = parseFloat(t.replace(/[,.]/g, ''));
  }
  if (isNaN(n)) return '—';
  const [i, d] = n.toFixed(2).split('.');
  return i.replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0') + '.' + d;
}
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = isError ? 'var(--danger)' : 'var(--text)';
  el.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--accent)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
</body>
</html>
