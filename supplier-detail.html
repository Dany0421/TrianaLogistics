<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net; img-src 'self' data:;">
<title>Detalhe Fornecedor — Procurement</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@1.8.0/dist/umd/lucide.min.js" integrity="sha384-+8nbzwDAyu5kAjqtR/XKxIgPHQD2TflvbZgeDZn5t3JP+OOogNH1jXnfel8ZAgzS" crossorigin="anonymous"></script>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<style>
  .back-link { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); margin-bottom:20px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; transition:.15s; }
  .back-link:hover { color:var(--accent); }
  .supplier-header { margin-bottom:24px; }
  .supplier-name { font-size:26px; font-weight:700; color:#fff; letter-spacing:-.4px; margin-bottom:6px; }
  .supplier-email { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); margin-bottom:12px; }
  .supplier-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:6px; }
  .chip { display:inline-flex; align-items:center; background:rgba(37,99,235,.1); border:1px solid rgba(37,99,235,.25); border-radius:4px; padding:2px 8px; font-size:11px; color:var(--accent); font-family:'DM Mono',monospace; }
  .chip-brand { background:rgba(124,58,237,.1); border-color:rgba(124,58,237,.3); color:#a78bfa; }
  .chip-foreign { background:rgba(255,170,0,.1); border-color:rgba(255,170,0,.3); color:#ffaa00; }
  .notes-row { font-size:13px; color:var(--muted); margin-top:4px; font-style:italic; }
  .stats-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:28px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
  .stat-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.7px; text-transform:uppercase; margin-bottom:6px; }
  .stat-value { font-size:22px; font-weight:700; color:#fff; }
  .stat-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .section-title { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; margin-bottom:14px; border-bottom:1px solid var(--border); padding-bottom:8px; }
  .resp-time-badge { font-family:'DM Mono',monospace; font-size:10px; background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.25); color:#34d399; border-radius:4px; padding:1px 7px; white-space:nowrap; }
  .data-table { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:24px; }
  .data-table th { text-align:left; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.7px; text-transform:uppercase; padding:7px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .data-table td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.04); vertical-align:top; }
  .data-table tr:hover td { background:rgba(37,99,235,.03); }
  .price-group { margin-bottom:28px; }
  .price-group-title { font-size:13px; font-weight:600; color:#e2e8f0; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .count-chip { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); background:rgba(255,255,255,.05); padding:1px 7px; border-radius:4px; }
  .price-val { font-family:'DM Mono',monospace; font-weight:600; color:#fff; white-space:nowrap; }
  .trend-bar { font-size:12px; color:var(--muted); padding:8px 10px; background:rgba(255,255,255,.02); border-radius:5px; display:flex; gap:16px; flex-wrap:wrap; align-items:center; margin-top:2px; }
  .trend-up { color:#f87171; }
  .trend-down { color:#34d399; }
  .trend-neutral { color:var(--muted); }
  .proc-link { color:var(--accent); cursor:pointer; text-decoration:none; }
  .proc-link:hover { text-decoration:underline; }
  .empty-msg { color:var(--muted); font-size:13px; padding:16px 0; }
  .section-wrap { margin-bottom:32px; }
  .mono-sm { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
  .contacts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; margin-bottom:10px; }
  .contact-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; display:flex; flex-direction:column; gap:4px; position:relative; }
  .contact-card:hover { border-color:rgba(37,99,235,.35); }
  .contact-name { font-size:13px; font-weight:600; color:var(--text); }
  .contact-phone { font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); cursor:pointer; width:fit-content; }
  .contact-phone:hover { text-decoration:underline; }
  .contact-note { font-size:11px; color:var(--muted); font-style:italic; margin-top:2px; }
  .contact-actions { position:absolute; top:10px; right:10px; display:flex; gap:4px; opacity:0; transition:.15s; }
  .contact-card:hover .contact-actions { opacity:1; }
  .contact-btn { background:none; border:none; cursor:pointer; color:var(--muted); padding:2px 4px; border-radius:3px; line-height:1; }
  .contact-btn:hover { color:var(--text); background:rgba(255,255,255,.06); }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="appSidebar"></aside>
  <div class="main-area">
    <div class="page-content">
      <div class="back-link">&#8592; Fornecedores</div>
      <div id="mainContent"><div class="empty-msg">A carregar...</div></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="js/supplier-detail-page.js"></script>
</body>
</html>
