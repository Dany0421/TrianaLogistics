<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net; img-src 'self' data:; worker-src blob:;">
<title>Fornecedores — Procurement</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<style>
  .back-link { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); margin-bottom:20px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; transition:.15s; }
  .back-link:hover { color:var(--accent); }
  .page-title { font-size:22px; font-weight:700; color:#fff; letter-spacing:-.3px; margin-bottom:4px; }
  .page-sub { font-size:13px; color:var(--muted); margin-bottom:24px; }

  .search-bar { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
  .search-input-wrap { position:relative; flex:1; min-width:220px; }
  .search-input-wrap input { width:100%; padding-right:36px; }
  .search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:0; line-height:1; }
  .search-clear:hover { color:var(--text); }

  .cat-filter-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
  .cat-chip-filter { font-family:'DM Mono',monospace; font-size:11px; padding:5px 12px; border:1px solid var(--border); border-radius:20px; cursor:pointer; color:var(--muted); background:var(--surface); transition:.12s; letter-spacing:.3px; }
  .cat-chip-filter:hover { border-color:var(--accent); color:var(--accent); }
  .cat-chip-filter.active { border-color:var(--accent); color:var(--accent); background:rgba(37,99,235,.1); }

  .results-info { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:12px; letter-spacing:.3px; }

  .supp-table { width:100%; border-collapse:collapse; font-size:13px; }
  .supp-table th { text-align:left; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.7px; text-transform:uppercase; padding:8px 12px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .supp-table td { padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:top; }
  .supp-table tr:hover td { background:rgba(37,99,235,.03); }

  .supp-name { font-size:13px; color:#fff; font-weight:500; }
  .supp-email { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-top:2px; }

  .chip { display:inline-flex; align-items:center; background:rgba(37,99,235,.1); border:1px solid rgba(37,99,235,.25); border-radius:4px; padding:2px 7px; font-size:11px; color:var(--accent); margin:2px 2px 2px 0; font-family:'DM Mono',monospace; }
  .chip-brand { background:rgba(124,58,237,.1); border-color:rgba(124,58,237,.3); color:#a78bfa; }

  .supp-actions { display:flex; gap:6px; white-space:nowrap; }

  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state .icon { font-size:36px; margin-bottom:12px; opacity:.4; }
  .empty-state .msg { font-size:14px; }

  .resp-time-badge { font-family:'DM Mono',monospace; font-size:10px; background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.25); color:#34d399; border-radius:4px; padding:1px 7px; white-space:nowrap; }
  .tag-input-box { display:flex; flex-wrap:wrap; gap:5px; align-items:center; border:1px solid var(--border); border-radius:6px; padding:5px 8px; min-height:36px; background:var(--surface2); cursor:text; }
  .tag-chip { display:inline-flex; align-items:center; gap:4px; background:rgba(37,99,235,.12); border:1px solid rgba(37,99,235,.3); border-radius:4px; padding:2px 6px; font-size:12px; color:var(--accent); }
  .tag-chip-brand { background:rgba(124,58,237,.1); border-color:rgba(124,58,237,.3); color:#a78bfa; }
  .tag-chip button { background:none; border:none; color:var(--muted); cursor:pointer; padding:0; font-size:12px; line-height:1; }
  .tag-chip button:hover { color:var(--danger); }
  .tag-input-field { border:none; background:none; outline:none; font-size:13px; color:var(--text); flex:1; min-width:80px; }
</style>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="appSidebar"></aside>
  <div class="main-area">
    <div class="page-content">

    <div class="back-link" onclick="window.location.href='dashboard.html'">&#8592; Dashboard</div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="page-title">Base de Fornecedores</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost btn-sm" id="reportBtn" style="display:none" onclick="exportSupplierReport()">&#8595; Relatório</button>
        <button class="btn btn-primary" id="addBtn" onclick="openSupplierModal()">+ Adicionar</button>
      </div>
    </div>
    <div class="page-sub">Diret&oacute;rio global de fornecedores com categorias de equipamentos e marcas.</div>

    <div class="search-bar">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="Pesquisar por nome, categoria ou marca..." autocomplete="off"
          oninput="filterSuppliers()">
        <button class="search-clear" id="clearBtn" onclick="clearSearch()" style="display:none">&#215;</button>
      </div>
    </div>

    <div class="cat-filter-chips" id="catChips"></div>

    <div class="results-info" id="resultsInfo"></div>
    <div id="suppArea">
      <div class="empty-state"><div class="icon">&#128101;</div><div class="msg">A carregar...</div></div>
    </div>

    </div>
  </div>
</div>

<div id="toast"></div>
<div id="modalRoot"></div>

<script>
let allSuppliers = [];
let activeCat = '';
let editingId = null;
let pendingCats = [];
let pendingBrands = [];
let selectedIds = new Set();
let supplierStatsMap = {};
let currentVisible = [];

const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatResponseTime(h) { if (!h || h <= 0) return '—'; return h < 24 ? Math.round(h) + 'h' : (h / 24).toFixed(1) + ' dias'; }
function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' toast-error' : ' toast-success') + ' show';
  setTimeout(() => t.className = 'toast', 3000);
}
function showModal(html) {
  closeModal();
  const root = document.getElementById('modalRoot');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
  const box = document.createElement('div');
  box.className = 'modal-box';
  const frag = document.createRange().createContextualFragment(html);
  box.appendChild(frag);
  overlay.appendChild(box);
  root.appendChild(overlay);
}
function closeModal() {
  const root = document.getElementById('modalRoot');
  while (root.firstChild) root.removeChild(root.firstChild);
}

window.addEventListener('load', async () => {
  if (hasRole('commercial')) { window.location.href = 'dashboard.html'; return; }
  await requireAuth('index.html');
  mountSidebar(document.getElementById('appSidebar'));
  document.getElementById('addBtn').style.display = hasRole('admin') || hasRole('procurement') ? '' : 'none';
  await loadSuppliers();
});

async function loadSuppliers() {
  try {
    [allSuppliers] = await Promise.all([API.getGlobalSuppliers()]);
    // Build stats map from process suppliers table
    try {
      const allStats = await API.getAllSupplierStats();
      const raw = {};
      for (const row of allStats) {
        const key = (row.name || '').trim().toLowerCase();
        if (!raw[key]) raw[key] = { pids: new Set(), hours: [] };
        if (row.process_id) raw[key].pids.add(row.process_id);
        if (row.contacted_at && row.replied_at) {
          const h = (new Date(row.replied_at) - new Date(row.contacted_at)) / 3600000;
          if (h > 0 && h < 8760) raw[key].hours.push(h);
        }
      }
      supplierStatsMap = {};
      for (const k of Object.keys(raw)) {
        const s = raw[k];
        supplierStatsMap[k] = { processCount: s.pids.size, avgHours: s.hours.length ? s.hours.reduce((a,b)=>a+b,0)/s.hours.length : 0, sampleCount: s.hours.length };
      }
    } catch(_) {}
    renderCatChips();
    filterSuppliers();
  } catch(e) {
    const area = document.getElementById('suppArea');
    area.replaceChildren();
    const wrap = document.createElement('div');
    wrap.className = 'empty-state';
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.style.color = 'var(--danger)';
    msg.textContent = e.message;
    wrap.appendChild(msg);
    area.appendChild(wrap);
  }
}

function renderCatChips() {
  const all = new Set();
  allSuppliers.forEach(s => (s.categories||[]).forEach(c => all.add(c)));
  const chips = document.getElementById('catChips');
  chips.replaceChildren();
  const allSpan = document.createElement('span');
  allSpan.className = 'cat-chip-filter' + (!activeCat ? ' active' : '');
  allSpan.textContent = 'Todos';
  allSpan.addEventListener('click', () => setCatFilter(''));
  chips.appendChild(allSpan);
  [...all].sort().forEach(c => {
    const s = document.createElement('span');
    s.className = 'cat-chip-filter' + (activeCat === c ? ' active' : '');
    s.textContent = c;
    s.addEventListener('click', () => setCatFilter(c));
    chips.appendChild(s);
  });
}

function setCatFilter(cat) {
  activeCat = cat;
  renderCatChips();
  filterSuppliers();
}

function filterSuppliers() {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  document.getElementById('clearBtn').style.display = q ? '' : 'none';
  let list = allSuppliers;
  if (q) list = list.filter(s =>
    s.name?.toLowerCase().includes(q) ||
    (s.categories||[]).some(c => c.toLowerCase().includes(q)) ||
    (s.brands||[]).some(b => b.toLowerCase().includes(q))
  );
  if (activeCat) list = list.filter(s => (s.categories||[]).includes(activeCat));
  currentVisible = list;
  document.getElementById('resultsInfo').textContent = list.length + ' fornecedor' + (list.length !== 1 ? 'es' : '');
  renderTable(list, q);
  updateReportBtn();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  filterSuppliers();
}

function appendHighlightedName(el, text, q) {
  if (!q) { el.textContent = text; return; }
  const lower = text.toLowerCase();
  const qq = q.toLowerCase();
  let idx = 0;
  while (idx < text.length) {
    const i = lower.indexOf(qq, idx);
    if (i < 0) { el.appendChild(document.createTextNode(text.slice(idx))); break; }
    if (i > idx) el.appendChild(document.createTextNode(text.slice(idx, i)));
    const mark = document.createElement('mark');
    mark.style.cssText = 'background:rgba(251,191,36,.2);color:#fcd34d;border-radius:2px;padding:0 1px';
    mark.textContent = text.slice(i, i + qq.length);
    el.appendChild(mark);
    idx = i + qq.length;
  }
}

function renderTable(list, q) {
  const area = document.getElementById('suppArea');
  if (!list.length) {
    area.replaceChildren();
    const wrap = document.createElement('div');
    wrap.className = 'empty-state';
    const icon = document.createElement('div');
    icon.className = 'icon';
    icon.textContent = '\u{1F465}';
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = 'Nenhum fornecedor encontrado.';
    wrap.appendChild(icon);
    wrap.appendChild(msg);
    area.appendChild(wrap);
    return;
  }
  const canEdit = hasRole('admin') || hasRole('procurement');
  const table = document.createElement('table');
  table.className = 'supp-table';
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  // Checkbox header
  const thCb = document.createElement('th');
  thCb.style.cssText = 'width:32px;padding:8px 8px 8px 12px';
  const headerCb = document.createElement('input');
  headerCb.type = 'checkbox';
  headerCb.id = 'selectAllCb';
  headerCb.title = 'Selecionar todos';
  headerCb.addEventListener('change', () => {
    if (headerCb.checked) { currentVisible.forEach(s => selectedIds.add(s.id)); }
    else { currentVisible.forEach(s => selectedIds.delete(s.id)); }
    updateReportBtn();
    table.querySelectorAll('tbody input[type=checkbox]').forEach(cb => { cb.checked = headerCb.checked; });
  });
  thCb.appendChild(headerCb);
  hr.appendChild(thCb);
  ['Fornecedor', 'Categorias', 'Marcas', 'Tempo Médio', ''].forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  for (const s of list) {
    const tr = document.createElement('tr');
    // Checkbox cell
    const tdCb = document.createElement('td');
    tdCb.style.cssText = 'width:32px;padding:9px 8px 9px 12px;vertical-align:middle';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = selectedIds.has(s.id);
    cb.addEventListener('change', () => {
      if (cb.checked) selectedIds.add(s.id); else selectedIds.delete(s.id);
      updateReportBtn();
      const allChecked = currentVisible.every(v => selectedIds.has(v.id));
      const anyChecked = currentVisible.some(v => selectedIds.has(v.id));
      const hcb = document.getElementById('selectAllCb');
      if (hcb) { hcb.checked = allChecked; hcb.indeterminate = !allChecked && anyChecked; }
    });
    tdCb.appendChild(cb);
    tr.appendChild(tdCb);
    const tdName = document.createElement('td');
    const nameDiv = document.createElement('div');
    nameDiv.className = 'supp-name';
    appendHighlightedName(nameDiv, s.name || '', q);
    tdName.appendChild(nameDiv);
    if (s.email) {
      const em = document.createElement('div');
      em.className = 'supp-email';
      em.textContent = s.email;
      tdName.appendChild(em);
    }
    if (s.email_cc) {
      const emc = document.createElement('div');
      emc.className = 'supp-email';
      emc.style.color = 'var(--muted)';
      emc.textContent = 'cc: ' + s.email_cc;
      tdName.appendChild(emc);
    }
    const tdCats = document.createElement('td');
    const cats = s.categories || [];
    if (cats.length) {
      cats.forEach(c => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = c;
        tdCats.appendChild(chip);
      });
    } else {
      const sp = document.createElement('span');
      sp.style.color = 'var(--muted)';
      sp.style.fontSize = '12px';
      sp.textContent = '\u2014';
      tdCats.appendChild(sp);
    }
    const tdBrands = document.createElement('td');
    const brands = s.brands || [];
    if (brands.length) {
      brands.forEach(b => {
        const chip = document.createElement('span');
        chip.className = 'chip chip-brand';
        chip.textContent = b;
        tdBrands.appendChild(chip);
      });
    } else {
      const sp = document.createElement('span');
      sp.style.color = 'var(--muted)';
      sp.style.fontSize = '12px';
      sp.textContent = '\u2014';
      tdBrands.appendChild(sp);
    }
    const tdTime = document.createElement('td');
    const stats = supplierStatsMap[(s.name||'').trim().toLowerCase()] || { avgHours: 0, sampleCount: 0 };
    if (stats.avgHours > 0) {
      const badge = document.createElement('span');
      badge.className = 'resp-time-badge';
      badge.textContent = '~' + formatResponseTime(stats.avgHours);
      tdTime.appendChild(badge);
      tdTime.appendChild(document.createTextNode(' '));
      const n = document.createElement('span');
      n.style.fontFamily = "'DM Mono',monospace";
      n.style.fontSize = '10px';
      n.style.color = 'var(--muted)';
      n.textContent = '(n=' + stats.sampleCount + ')';
      tdTime.appendChild(n);
    } else {
      const sp = document.createElement('span');
      sp.style.color = 'var(--muted)';
      sp.style.fontSize = '12px';
      sp.textContent = '\u2014';
      tdTime.appendChild(sp);
    }
    const tdAct = document.createElement('td');
    const actDiv = document.createElement('div');
    actDiv.className = 'supp-actions';
    const viewBtn = document.createElement('button');
    viewBtn.className = 'btn btn-ghost btn-sm';
    viewBtn.textContent = 'Ver';
    viewBtn.addEventListener('click', () => {
      window.location.href = 'supplier-detail.html?name=' + encodeURIComponent(s.name);
    });
    actDiv.appendChild(viewBtn);
    if (canEdit) {
      const ed = document.createElement('button');
      ed.className = 'btn btn-ghost btn-sm';
      ed.textContent = 'Editar';
      ed.addEventListener('click', () => openSupplierModal(s.id));
      const del = document.createElement('button');
      del.className = 'btn btn-danger btn-sm';
      del.textContent = '\u00d7';
      del.addEventListener('click', () => confirmDelete(s.id, s.name));
      actDiv.appendChild(ed);
      actDiv.appendChild(del);
    }
    tdAct.appendChild(actDiv);
    tr.appendChild(tdName);
    tr.appendChild(tdCats);
    tr.appendChild(tdBrands);
    tr.appendChild(tdTime);
    tr.appendChild(tdAct);
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  area.replaceChildren();
  area.appendChild(table);
}

// ── Tag input helpers ──
function renderTagBox(boxId, arr, type, chipClass) {
  const box = document.getElementById(boxId);
  if (!box) return;
  while (box.firstChild) box.removeChild(box.firstChild);
  arr.forEach((c, i) => {
    const span = document.createElement('span');
    span.className = 'tag-chip' + (chipClass ? ' ' + chipClass : '');
    span.textContent = c;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = '\u00d7';
    btn.onclick = () => removeTag(type, i);
    span.appendChild(btn);
    box.appendChild(span);
  });
  const inp = document.createElement('input');
  inp.id = 'tagInput_' + type;
  inp.className = 'tag-input-field';
  inp.placeholder = 'Adicionar, Enter para confirmar...';
  inp.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = this.value.trim().replace(/,/g, '');
      if (!val) return;
      if (type === 'cat') { if (!pendingCats.includes(val)) pendingCats.push(val); renderTagBox(boxId, pendingCats, 'cat', ''); }
      else { if (!pendingBrands.includes(val)) pendingBrands.push(val); renderTagBox(boxId, pendingBrands, 'brand', 'tag-chip-brand'); }
      document.getElementById('tagInput_' + type)?.focus();
    }
  };
  box.appendChild(inp);
}

function removeTag(type, idx) {
  if (type === 'cat') { pendingCats.splice(idx, 1); renderTagBox('gsCatBox', pendingCats, 'cat', ''); }
  else { pendingBrands.splice(idx, 1); renderTagBox('gsBrandBox', pendingBrands, 'brand', 'tag-chip-brand'); }
}

// ── Modal ──
function openSupplierModal(id = null) {
  editingId = id;
  const s = id ? allSuppliers.find(x => x.id === id) : null;
  pendingCats = s ? [...(s.categories || [])] : [];
  pendingBrands = s ? [...(s.brands || [])] : [];

  showModal(
    '<div class="modal-tag">' + (s ? 'Editar Fornecedor' : 'Novo Fornecedor') + '</div>' +
    '<div class="modal-title">' + (s ? esc(s.name) : 'Adicionar Fornecedor') + '</div>' +
    '<div class="form-grid-2">' +
      '<div><label>Nome</label><input id="gs_name" value="" placeholder="Ex: Tech Solutions"></div>' +
      '<div><label>Email Principal</label><input id="gs_email" value="" placeholder="email@fornecedor.com"></div>' +
    '</div>' +
    '<div class="form-row"><label>Email CC <span style="font-size:11px;color:var(--muted);font-weight:400">(opcional)</span></label>' +
      '<input id="gs_email_cc" value="" placeholder="cc@fornecedor.com"></div>' +
    '<div class="form-grid-2">' +
      '<div><label>Categorias <span style="font-size:11px;color:var(--muted);font-weight:400">(tipos de equipamento)</span></label>' +
        '<div class="tag-input-box" id="gsCatBox"></div></div>' +
      '<div><label>Marcas</label>' +
        '<div class="tag-input-box" id="gsBrandBox"></div></div>' +
    '</div>' +
    '<div class="form-row"><label>Notas</label><textarea id="gs_notes"></textarea></div>' +
    '<div class="modal-actions">' +
      '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>' +
      '<button class="btn btn-primary" onclick="saveSupplier()">Guardar</button>' +
    '</div>'
  );
  const _gs = (id, v) => { const el = document.getElementById(id); if (el) el.value = v == null ? '' : String(v); };
  _gs('gs_name', s?.name || '');
  _gs('gs_email', s?.email || '');
  _gs('gs_email_cc', s?.email_cc || '');
  _gs('gs_notes', s?.notes || '');
  renderTagBox('gsCatBox', pendingCats, 'cat', '');
  renderTagBox('gsBrandBox', pendingBrands, 'brand', 'tag-chip-brand');
}

async function saveSupplier() {
  const name = document.getElementById('gs_name').value.trim();
  const email = document.getElementById('gs_email').value.trim() || null;
  const email_cc = document.getElementById('gs_email_cc').value.trim() || null;
  const notes = document.getElementById('gs_notes').value.trim() || null;

  if (!name) { showToast('Nome obrigat\u00f3rio.', true); return; }
  if (name.length > 200) { showToast('Nome demasiado longo.', true); return; }
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('Email inv\u00e1lido.', true); return; }
  if (email_cc && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email_cc)) { showToast('Email CC inv\u00e1lido.', true); return; }

  const fields = { name, email, email_cc, categories: pendingCats, brands: pendingBrands, notes };
  try {
    if (editingId) {
      await API.updateGlobalSupplier(editingId, fields);
    } else {
      await API.createGlobalSupplier(fields);
    }
    closeModal();
    showToast('Fornecedor guardado.');
    await loadSuppliers();
  } catch(e) { showToast('Erro: ' + e.message, true); }
}

function confirmDelete(id, name) {
  if (!UUID_RE.test(id)) return;
  showModal(
    '<div class="modal-tag">Confirmar</div>' +
    '<div class="modal-title">Apagar Fornecedor</div>' +
    '<div style="color:var(--muted);font-size:14px;margin-bottom:24px">Apagar <strong style="color:#fff">' + esc(name) + '</strong>? Esta a&ccedil;&atilde;o n&atilde;o pode ser desfeita.</div>' +
    '<div class="modal-actions">' +
      '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>' +
      '<button class="btn btn-danger" onclick="doDelete(\'' + id + '\')">Apagar</button>' +
    '</div>'
  );
}

async function doDelete(id) {
  if (!UUID_RE.test(id)) return;
  try {
    await API.deleteGlobalSupplier(id);
    closeModal();
    showToast('Fornecedor apagado.');
    await loadSuppliers();
  } catch(e) { showToast('Erro: ' + e.message, true); }
}

function updateReportBtn() {
  const btn = document.getElementById('reportBtn');
  if (!btn) return;
  const n = selectedIds.size;
  btn.style.display = n > 0 ? '' : 'none';
  btn.textContent = '\u2193 Relat\u00f3rio (' + n + ')';
}

async function exportSupplierReport() {
  if (!selectedIds.size) return;
  const selected = allSuppliers.filter(s => selectedIds.has(s.id));
  selected.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet('Fornecedores');

  // Title row
  ws.mergeCells('A1:G1');
  const title = ws.getCell('A1');
  title.value = 'Relatório de Fornecedores — Triana';
  title.font = { bold: true, size: 14, color: { argb: 'FFFFFFFF' } };
  title.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0F1E2E' } };
  title.alignment = { horizontal: 'left', vertical: 'middle' };
  ws.getRow(1).height = 28;

  // Date row
  ws.mergeCells('A2:G2');
  const dateCell = ws.getCell('A2');
  dateCell.value = 'Gerado em: ' + new Date().toLocaleDateString('pt-PT');
  dateCell.font = { size: 10, color: { argb: 'FF6B7280' } };
  dateCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0F1E2E' } };
  ws.getRow(2).height = 16;

  // Empty row
  ws.getRow(3).height = 6;

  // Headers
  const hdrs = ['Nome', 'Email', 'Email CC', 'Categorias', 'Marcas', 'Nº Processos', 'Tempo Médio'];
  const hRow = ws.getRow(4);
  hdrs.forEach((h, i) => {
    const c = hRow.getCell(i + 1);
    c.value = h;
    c.font = { bold: true, size: 11, color: { argb: 'FFFFFFFF' } };
    c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1D2D44' } };
    c.alignment = { vertical: 'middle' };
    c.border = { bottom: { style: 'thin', color: { argb: 'FF2D4A6A' } } };
  });
  hRow.height = 22;

  // Build all row data first so we can auto-size columns
  const allRows = selected.map(s => {
    const key = (s.name || '').trim().toLowerCase();
    const st = supplierStatsMap[key] || { processCount: 0, avgHours: 0 };
    return [
      s.name || '',
      s.email || '',
      s.email_cc || '',
      (s.categories || []).join(', '),
      (s.brands || []).join(', '),
      st.processCount || 0,
      st.avgHours > 0 ? formatResponseTime(st.avgHours) : '—',
    ];
  });

  // Auto column widths: max content length per column + padding, capped at 60
  const colWidths = hdrs.map((h, i) => {
    const maxData = allRows.reduce((m, r) => Math.max(m, String(r[i] || '').length), 0);
    return Math.min(60, Math.max(h.length, maxData) + 4);
  });
  colWidths.forEach((w, i) => { ws.getColumn(i + 1).width = w; });

  // Data rows
  allRows.forEach((vals, idx) => {
    const rn = 5 + idx;
    const bg = idx % 2 === 0 ? 'FF111827' : 'FF0D1520';
    const row = ws.getRow(rn);
    vals.forEach((v, i) => {
      const c = row.getCell(i + 1);
      c.value = v;
      c.font = { size: 11, color: { argb: 'FFCDD5E0' } };
      c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bg } };
      c.alignment = { vertical: 'middle', wrapText: false };
    });
    row.height = 20;
  });

  try {
    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Fornecedores_Triana_' + new Date().toISOString().slice(0, 10) + '.xlsx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) { showToast('Erro ao gerar Excel: ' + e.message, true); }
}
</script>
