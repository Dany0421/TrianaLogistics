<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data:;">
<title>Procurement System — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" integrity="sha384-Y1tzkgTMv0NgNIkhIaJiI9rqNrOLfosToPr6Bzp4XVIOvF1BUd7mNlUVPpo6G8lL" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@1.8.0/dist/umd/lucide.min.js" integrity="sha384-+8nbzwDAyu5kAjqtR/XKxIgPHQD2TflvbZgeDZn5t3JP+OOogNH1jXnfel8ZAgzS" crossorigin="anonymous"></script>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js" defer></script>
</head>
<body class="login-page">

<div class="login-layout">

  <!-- Left brand panel -->
  <div class="login-panel-left">
    <div class="login-panel-left-content">
      <div class="login-wordmark">
        <div class="login-logo-mark">T</div>
        <div>
          <div class="login-co-name">Triana</div>
          <div class="login-co-sub">Logística &amp; Procurement</div>
        </div>
      </div>
      <div class="login-panel-tagline">
        Gestão de procurement<br><span>centralizada e eficiente.</span>
      </div>
      <div class="login-panel-footnote">Sistema interno · Acesso restrito</div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="login-panel-right">
    <div class="login-form-wrap">
      <div class="login-form-eyebrow">Procurement System</div>
      <div class="login-form-title" id="loginTitle">Bem-vindo de volta</div>
      <div class="login-form-sub" id="loginSub">Introduz as tuas credenciais para entrar.</div>

      <!-- Name row (signup only) -->
      <div class="form-row" id="nameRow" style="display:none">
        <label>Nome</label>
        <input type="text" id="name" placeholder="O teu nome" autocomplete="name">
      </div>

      <!-- Email row (login / signup / reset) -->
      <div class="form-row" id="emailRow">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@triana.co.mz" autocomplete="username">
      </div>

      <!-- Password row (login / signup / new-password) -->
      <div class="form-row" id="passwordRow">
        <label id="passwordLabel">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <!-- Confirm password row (new-password only) -->
      <div class="form-row" id="confirmRow" style="display:none">
        <label>Confirmar nova password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
      </div>

      <div id="errorMsg" class="login-error-msg"></div>

      <button class="btn btn-primary btn-login" id="submitBtn">Entrar</button>

      <!-- Forgot password link (login mode only) -->
      <div id="forgotRow" style="text-align:right;margin-top:10px">
        <span style="font-size:12px;color:var(--muted);cursor:pointer;transition:.15s">Esqueceste a password?</span>
      </div>

      <div class="login-toggle">
        <span id="toggleMsg">Ainda não tens conta?</span>
        <span class="login-toggle-link" id="toggleLink">Registar</span>
      </div>
    </div>
  </div>

</div>

<script src="js/index-page.js"></script>
</body>
</html>
