<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data:;">
<title>Procurement System — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js" defer></script>
</head>
<body class="login-page">

<div class="login-layout">

  <!-- Left brand panel -->
  <div class="login-panel-left">
    <div class="login-panel-left-content">
      <!-- Wordmark -->
      <div class="login-wordmark">
        <div class="login-logo-mark">T</div>
        <div>
          <div class="login-co-name">Triana</div>
          <div class="login-co-sub">Logística &amp; Procurement</div>
        </div>
      </div>

      <!-- Tagline -->
      <div class="login-panel-tagline">
        Gestão de procurement<br><span>centralizada e eficiente.</span>
      </div>

      <!-- Footnote -->
      <div class="login-panel-footnote">Sistema interno · Acesso restrito</div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="login-panel-right">
    <div class="login-form-wrap">
      <div class="login-form-eyebrow">Procurement System</div>
      <div class="login-form-title" id="loginTitle">Bem-vindo de volta</div>
      <div class="login-form-sub" id="loginSub">Introduz as tuas credenciais para entrar.</div>

      <div class="form-row" id="nameRow" style="display:none">
        <label>Nome</label>
        <input type="text" id="name" placeholder="O teu nome" autocomplete="name">
      </div>
      <!-- Role is assigned server-side (always 'commercial'); admin promotes via DB -->
      <div class="form-row">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@triana.co.mz" autocomplete="username">
      </div>
      <div class="form-row">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <div id="errorMsg" class="login-error-msg"></div>

      <button class="btn btn-primary btn-login" id="submitBtn" onclick="doSubmit()">Entrar</button>

      <div class="login-toggle">
        <span id="toggleMsg">Ainda não tens conta?</span>
        <span onclick="toggleMode()" class="login-toggle-link" id="toggleLink">Registar</span>
      </div>
    </div>
  </div>

</div>

<script>
let isSignup = false;
let loginAttempts = 0;
let lockoutUntil = 0;

function toggleMode() {
  isSignup = !isSignup;
  document.getElementById('nameRow').style.display = isSignup ? 'block' : 'none';
  document.getElementById('submitBtn').textContent = isSignup ? 'Criar conta' : 'Entrar';
  document.getElementById('loginTitle').textContent = isSignup ? 'Criar conta' : 'Bem-vindo de volta';
  document.getElementById('loginSub').textContent = isSignup ? 'Preenche os campos abaixo para criar a tua conta.' : 'Introduz as tuas credenciais para entrar.';
  document.getElementById('toggleMsg').textContent = isSignup ? 'Já tens conta?' : 'Ainda não tens conta?';
  document.getElementById('toggleLink').textContent = isSignup ? 'Entrar' : 'Registar';
  document.getElementById('errorMsg').style.display = 'none';
}

async function doSubmit() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errorMsg');
  errEl.style.display = 'none';
  errEl.style.color = 'var(--danger)';

  if (!email || !password) { errEl.textContent = 'Preenche email e password.'; errEl.style.display = 'block'; return; }

  // Rate limiting: lockout after 5 failed attempts for 60s
  if (Date.now() < lockoutUntil) {
    const secs = Math.ceil((lockoutUntil - Date.now()) / 1000);
    errEl.textContent = `Demasiadas tentativas. Aguarda ${secs}s.`;
    errEl.style.display = 'block';
    return;
  }

  // Email domain validation (also enforced server-side via trigger)
  if (!email.endsWith('@triana.co.mz')) {
    errEl.textContent = 'Apenas emails @triana.co.mz são permitidos.';
    errEl.style.display = 'block';
    return;
  }

  if (isSignup) {
    const name = document.getElementById('name').value.trim();
    if (!name || name.length < 2) { errEl.textContent = 'Introduz o teu nome (mínimo 2 caracteres).'; errEl.style.display = 'block'; return; }
    if (name.length > 100) { errEl.textContent = 'Nome demasiado longo (máximo 100 caracteres).'; errEl.style.display = 'block'; return; }
    if (password.length < 8) { errEl.textContent = 'Password deve ter pelo menos 8 caracteres.'; errEl.style.display = 'block'; return; }
    // Role is NOT sent to the server; trigger always assigns 'commercial'
    const { error } = await supabase.auth.signUp({ email, password, options: { data: { name } } });
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
    errEl.style.color = 'var(--accent)';
    errEl.textContent = 'Conta criada! Verifica o email para confirmar.';
    errEl.style.display = 'block';
  } else {
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      loginAttempts++;
      if (loginAttempts >= 5) {
        lockoutUntil = Date.now() + 60000;
        loginAttempts = 0;
        errEl.textContent = 'Demasiadas tentativas. Aguarda 60 segundos.';
      } else {
        errEl.textContent = 'Email ou password incorretos.';
      }
      errEl.style.display = 'block';
      return;
    }
    loginAttempts = 0;
    window.location.href = 'dashboard.html';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit(); });

window.addEventListener('load', async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
