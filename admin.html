<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data:;">
<title>Procurement System — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" integrity="sha384-Y1tzkgTMv0NgNIkhIaJiI9rqNrOLfosToPr6Bzp4XVIOvF1BUd7mNlUVPpo6G8lL" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@1.8.0/dist/umd/lucide.min.js" integrity="sha384-+8nbzwDAyu5kAjqtR/XKxIgPHQD2TflvbZgeDZn5t3JP+OOogNH1jXnfel8ZAgzS" crossorigin="anonymous"></script>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<style>
/* ── Tabs ── */
.admin-tabs {
  display: flex; gap: 4px; margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.admin-tab {
  background: none; border: none; color: var(--muted);
  padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 500;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s;
}
.admin-tab.active { color: #fff; border-bottom-color: var(--accent); }
.admin-tab:hover:not(.active) { color: var(--text); }

/* ── Admin shared ── */
.admin-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.admin-title { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
.admin-title span {
  font-size: 13px; font-weight: 400; color: var(--muted);
  font-family: 'DM Mono', monospace; margin-left: 10px;
}

/* ── User table ── */
.user-table-header {
  display: grid; grid-template-columns: 1fr 1fr 110px 130px 70px;
  gap: 12px; padding: 8px 14px;
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px;
}
.user-row {
  display: grid; grid-template-columns: 1fr 1fr 110px 130px 70px;
  gap: 12px; align-items: center;
  padding: 11px 14px; border-radius: 8px;
  border: 1px solid transparent;
  transition: background .12s, border-color .12s;
}
.user-row:hover { background: var(--surface2); border-color: var(--border); }
.user-name { font-size: 13px; color: var(--text); font-weight: 500; }
.user-name-you { font-size: 11px; color: var(--muted); margin-left: 6px; font-family: 'DM Mono', monospace; }
.user-email { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-last-seen { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.user-actions { display: flex; justify-content: flex-end; }

/* ── Log ── */
.log-filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
.log-list { display: flex; flex-direction: column; gap: 2px; }
.log-entry {
  display: grid; grid-template-columns: 140px 130px 110px 1fr;
  gap: 12px; align-items: start;
  padding: 11px 14px; border-radius: 8px; border: 1px solid transparent;
  transition: background .12s, border-color .12s;
}
.log-entry:hover { background: var(--surface2); border-color: var(--border); }
.log-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); padding-top: 2px; white-space: nowrap; }
.log-actor { font-size: 13px; color: var(--text); font-weight: 500; }
.log-actor-role { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.log-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase; white-space: nowrap;
}
.log-badge-process  { background: rgba(37,99,235,.15);  color: #38bdf8; }
.log-badge-supplier { background: rgba(245,158,11,.15);  color: #fbbf24; }
.log-badge-bom      { background: rgba(139,92,246,.15);  color: #a78bfa; }
.log-badge-offer    { background: rgba(16,185,129,.15);  color: #34d399; }
.log-badge-profile  { background: rgba(248,113,113,.15); color: #f87171; }
.log-desc { font-size: 13px; color: var(--text); line-height: 1.5; }
.log-desc strong { color: #fff; }
.log-load-more { text-align: center; margin-top: 20px; }

@media (max-width: 720px) {
  .log-entry, .user-row, .user-table-header { grid-template-columns: 1fr; gap: 4px; }
  .user-table-header { display: none; }
  .admin-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; }
  .admin-tab { white-space: nowrap; flex-shrink: 0; padding: 10px 14px; }
}
</style>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="appSidebar"></aside>
  <div class="main-area">
    <div class="page-content">

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" id="tabUsers">Utilizadores</button>
      <button class="admin-tab" id="tabLog">Registo de Atividade</button>
    </div>

    <!-- Section: Users -->
    <div id="sectionUsers">
      <div class="admin-header">
        <div class="admin-title">Utilizadores <span id="userCount"></span></div>
        <button class="btn btn-ghost btn-sm" id="refreshUsersBtn">Atualizar</button>
      </div>
      <div class="user-table-header">
        <span>Nome</span><span>Email</span><span>Cargo</span><span>Último acesso</span><span></span>
      </div>
      <div id="userList"><div class="empty-state"><span>A carregar...</span></div></div>
    </div>

    <!-- Section: Log -->
    <div id="sectionLog" style="display:none">
      <div class="admin-header">
        <div class="admin-title">Registo de Atividade <span id="logCount"></span></div>
      </div>
      <div class="log-filters">
        <input type="text" id="filterProcess" placeholder="Pesquisar processo..." style="max-width:220px">
        <select id="filterUser" style="max-width:200px">
          <option value="">Todos os utilizadores</option>
        </select>
        <select id="filterType" style="max-width:200px">
          <option value="">Todos os eventos</option>
          <option value="process_changes">Processos</option>
          <option value="supplier_changes">Fornecedores</option>
          <option value="bom_changes">BOM</option>
          <option value="offer_selections">Ofertas</option>
          <option value="profile_changes">Perfis</option>
        </select>
        <select id="filterDateRange" style="max-width:180px">
          <option value="">Todo o período</option>
          <option value="week">Esta semana</option>
          <option value="month">Este mês</option>
          <option value="last_month">Mês passado</option>
          <option value="3months">Últimos 3 meses</option>
          <option value="custom">Personalizado...</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="refreshLogBtn">Atualizar</button>
        <button class="btn btn-ghost btn-sm" id="exportBtn"
          style="border-color:rgba(16,185,129,.3);color:#34d399">Exportar PDF</button>
      </div>
      <div id="customDateWrap" style="display:none;margin-bottom:12px">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="date" id="dateFrom" style="max-width:160px">
          <span style="color:var(--muted);font-size:12px">→</span>
          <input type="date" id="dateTo" style="max-width:160px">
        </div>
      </div>
      <div class="log-list" id="logList">
        <div class="empty-state"><span>A carregar...</span></div>
      </div>
      <div class="log-load-more" id="loadMoreWrap" style="display:none">
        <button class="btn btn-ghost" id="loadMoreBtn">Carregar mais</button>
      </div>
    </div>

    </div>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script src="js/admin.js"></script>

</body>
</html>
