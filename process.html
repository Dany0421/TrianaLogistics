<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data:; worker-src blob: https://unpkg.com;">
<title>Processo — Procurement System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/bom-parser.js"></script>
<style>
  .back-link { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); margin-bottom:20px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; transition:.15s; }
  .back-link:hover { color:var(--accent); }
  .process-header { margin-bottom:28px; }
  .process-title { font-size:22px; font-weight:700; color:#fff; margin-bottom:4px; letter-spacing:-.3px; }
  .process-sub { font-size:14px; color:var(--muted); margin-bottom:12px; }
  .process-meta { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:24px; }
  .tab { padding:10px 20px; font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:.15s; letter-spacing:.3px; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }
  /* BOM validation table */
  .bom-validate-table { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:16px; table-layout:fixed; }
  .bom-validate-table th { text-align:left; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.8px; text-transform:uppercase; padding:6px 8px; border-bottom:1px solid var(--border); }
  .bom-validate-table td { padding:3px 4px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .bom-validate-table td input { padding:5px 7px; font-size:12px; }
  .bom-validate-table tr.cat-row td { background:var(--surface2); color:var(--accent2); font-family:'DM Mono',monospace; font-size:10px; padding:6px 8px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; }
  /* Supplier card */
  .supplier-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:10px; overflow:hidden; transition:border-color .15s; }
  .supplier-card:hover { border-color:rgba(37,99,235,.3); }
  .supplier-card-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:var(--surface2); border-bottom:1px solid var(--border); cursor:pointer; }
  .supplier-card-body { padding:18px; display:none; }
  .supplier-card-body.open { display:block; }
  .supplier-status-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .foreign-box { display:none; background:rgba(251,191,36,.05); border:1px solid rgba(251,191,36,.2); border-radius:8px; padding:12px; margin-bottom:12px; }
  .foreign-box.show { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .resp-time-badge { font-family:'DM Mono',monospace; font-size:10px; background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.25); color:#34d399; border-radius:4px; padding:1px 7px; white-space:nowrap; }
  .duration-banner { display:flex; align-items:center; gap:10px; background:rgba(99,102,241,.08); border:1px solid rgba(99,102,241,.25); border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:13px; color:var(--text); }
  .duration-banner .dur-icon { font-size:16px; flex-shrink:0; }
  .duration-banner .dur-body { flex:1; }
  .duration-banner .dur-main { font-weight:600; color:#a5b4fc; }
  .duration-banner .dur-sub { font-size:11px; color:var(--muted); margin-top:1px; }
  .duration-banner .dur-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:0 2px; line-height:1; }
  .anomaly-high { font-family:'DM Mono',monospace; font-size:10px; background:rgba(251,146,60,.1); border:1px solid rgba(251,146,60,.35); color:#fb923c; border-radius:4px; padding:1px 7px; white-space:nowrap; display:inline-block; margin-top:3px; }
  .anomaly-low { font-family:'DM Mono',monospace; font-size:10px; background:rgba(99,102,241,.12); border:1px solid rgba(99,102,241,.35); color:#818cf8; border-radius:4px; padding:1px 7px; white-space:nowrap; display:inline-block; margin-top:3px; }
  .sugg-banner { background:rgba(99,102,241,.07); border:1px solid rgba(99,102,241,.2); border-radius:8px; padding:14px 16px; margin-bottom:16px; }
  .sugg-banner-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:11px; color:#a5b4fc; font-weight:600; text-transform:uppercase; letter-spacing:.07em; }
  .sugg-cards { display:flex; flex-wrap:wrap; gap:10px; }
  .sugg-card { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:6px; padding:10px 14px; min-width:180px; max-width:260px; display:flex; flex-direction:column; gap:6px; }
  .sugg-card-name { font-size:13px; font-weight:600; color:#e2e8f0; }
  .sugg-card-cats { display:flex; flex-wrap:wrap; gap:3px; }
  .sugg-cat-chip { font-family:'DM Mono',monospace; font-size:10px; background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.3); color:#a5b4fc; border-radius:3px; padding:1px 6px; }
  .tag-input-box { display:flex; flex-wrap:wrap; gap:5px; align-items:center; border:1px solid var(--border); border-radius:6px; padding:5px 8px; min-height:36px; background:var(--surface2); cursor:text; }
  .tag-chip { display:inline-flex; align-items:center; gap:4px; background:rgba(37,99,235,.12); border:1px solid rgba(37,99,235,.3); border-radius:4px; padding:2px 6px; font-size:12px; color:var(--accent); }
  .tag-chip button { background:none; border:none; color:var(--muted); cursor:pointer; padding:0; font-size:12px; line-height:1; }
  .tag-chip button:hover { color:var(--danger); }
  .tag-input-field { border:none; background:none; outline:none; font-size:13px; color:var(--text); flex:1; min-width:80px; }
  /* Matching table */
  .match-table { border-collapse:collapse; font-size:13px; }
  .match-table th { text-align:left; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.8px; text-transform:uppercase; padding:8px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .match-table td { padding:4px 6px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .match-table th:first-child, .match-table td:first-child { position:sticky; left:0; background:var(--bg); z-index:1; box-shadow:2px 0 6px rgba(0,0,0,.4); }
  .match-table th:last-child, .match-table td:last-child { position:sticky; right:0; background:var(--bg); z-index:1; box-shadow:-2px 0 6px rgba(0,0,0,.4); }
  .match-table tr.match-cat-row td { background:var(--surface2); color:var(--accent); font-family:'DM Mono',monospace; font-size:10px; padding:6px 10px; letter-spacing:.8px; text-transform:uppercase; }
  .match-table tr.match-cat-row td:first-child, .match-table tr.match-cat-row td:last-child { background:var(--surface2); }
  .match-cell { border-radius:6px; padding:6px 8px; cursor:pointer; border:1px solid transparent; transition:.15s; min-height:36px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .match-cell:hover { border-color:var(--border); background:var(--surface2); }
  .match-cell.match-empty { color:#334; border:1px dashed var(--border); font-size:18px; }
  .match-cell.match-empty:hover { border-color:var(--muted); color:var(--muted); }
  .match-cell.match-selected { background:rgba(37,99,235,.1); border-color:var(--accent); }
  .match-cell.match-lowest { background:rgba(129,140,248,.08); border-color:var(--accent2); }
  .coverage-bar { height:4px; background:var(--border); border-radius:2px; flex:1; max-width:300px; }
  .coverage-bar-fill { height:100%; border-radius:2px; background:var(--accent); transition:width .4s; }
  /* Match pick list in modal */
  .match-pick-row { display:flex; align-items:center; gap:12px; padding:8px 10px; border-radius:6px; cursor:pointer; border:1px solid transparent; margin-bottom:4px; transition:.12s; }
  .match-pick-row:hover { background:var(--surface2); border-color:var(--border); }
  .match-pick-row.linked { background:rgba(37,99,235,.08); border-color:rgba(37,99,235,.3); }
  /* Quotation badge on supplier card */
  .quot-badge { font-family:'DM Mono',monospace; font-size:10px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:2px 8px; color:var(--muted); }
  .quot-badge.has-items { color:var(--accent2); border-color:rgba(129,140,248,.3); background:rgba(129,140,248,.08); }
  /* Comparison table */
  .comp-wrap { overflow-x:auto; }
  .comp-table { border-collapse:collapse; font-size:13px; min-width:100%; }
  .comp-table th { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; padding:8px 12px; border-bottom:1px solid var(--border); white-space:nowrap; min-width:130px; text-align:center; }
  .comp-table th:first-child { text-align:left; min-width:240px; position:sticky; left:0; background:var(--bg); z-index:1; box-shadow:2px 0 6px rgba(0,0,0,.4); }
  .comp-table td { padding:6px 10px; border-bottom:1px solid var(--border); vertical-align:middle; text-align:center; }
  .comp-table td:first-child { text-align:left; position:sticky; left:0; background:var(--bg); z-index:1; box-shadow:2px 0 6px rgba(0,0,0,.4); }
  .comp-table th:last-child, .comp-table td:last-child { position:sticky; right:0; background:var(--bg); z-index:1; box-shadow:-2px 0 6px rgba(0,0,0,.4); }
  .comp-table tr.comp-cat-row td { background:var(--surface2); color:var(--accent); font-family:'DM Mono',monospace; font-size:10px; padding:5px 10px; letter-spacing:.8px; text-transform:uppercase; }
  .comp-table tr.comp-cat-row td:first-child { background:var(--surface2); }
  .comp-table tfoot td { font-family:'DM Mono',monospace; font-size:11px; font-weight:600; color:#fff; border-top:1px solid var(--border); padding:7px 10px; }
  .comp-cell { border-radius:5px; padding:5px 8px; font-family:'DM Mono',monospace; font-size:12px; font-weight:600; display:inline-block; }
  .comp-cell-low  { background:rgba(16,185,129,.15); color:#34d399; }
  .comp-cell-sel  { background:rgba(37,99,235,.15);  color:#38bdf8; }
  .comp-cell-both { background:rgba(16,185,129,.2);   color:#34d399; outline:1px solid rgba(37,99,235,.5); }
  .comp-cell-none { color:#334; font-size:16px; }

  @media (max-width: 768px) {
    /* Tab bar — horizontal scroll */
    .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; }
    .tab { white-space: nowrap; flex-shrink: 0; padding: 12px 14px; font-size: 11px; min-height: 44px; display: flex; align-items: center; }
    /* Process header wraps on small screens */
    .process-header { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 10px; }
    /* BOM validation + matching tables — horizontal scroll */
    .bom-validate-table, .match-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  }
</style>
</head>
<body>

<div class="app-shell">
  <div class="topbar">
    <div class="topbar-brand">Triana · <span>Procurement</span></div>
    <div class="topbar-right" id="topbarRight"></div>
  </div>
  <div class="page-content">

    <div class="back-link" onclick="window.location.href='dashboard.html'">← Dashboard</div>

    <div class="process-header">
      <div class="process-title" id="procTitle">—</div>
      <div class="process-sub" id="procClient">—</div>
      <div class="process-meta" id="procMeta"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabBar"></div>

    <!-- BOM Tab -->
    <div id="tab-bom" class="tab-panel active">
      <div class="section-header">
        <span class="section-tag" id="bomVersionLabel">Sem BOM carregado</span>
        <div style="display:flex;gap:8px">
          <input type="file" id="bomFileInput" accept=".xlsx,.xls" style="display:none" onchange="handleBomUpload(this)">
          <button class="btn btn-ghost btn-sm" onclick="openManualBomEntry()"><i data-lucide="pencil" style="width:13px;height:13px;stroke-width:1.75;vertical-align:middle"></i> Manual</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('bomFileInput').click()"><i data-lucide="folder-open" style="width:13px;height:13px;stroke-width:1.75;vertical-align:middle"></i> Carregar BOM</button>
        </div>
      </div>
      <div id="durationBanner" style="display:none"></div>
      <div id="bomContent"><div class="empty-state">Sem BOM.<br>Carrega um ficheiro Excel para começar.</div></div>
    </div>

    <!-- Suppliers Tab -->
    <div id="tab-suppliers" class="tab-panel">
      <div class="section-header">
        <span class="section-tag" id="suppCount">0 fornecedores</span>
        <button class="btn btn-ghost btn-sm" onclick="openSupplierModal()">+ Adicionar Fornecedor</button>
      </div>
      <div id="suggBanner"></div>
      <div id="suppliersContent"><div class="empty-state">Sem fornecedores.<br>Adiciona o primeiro fornecedor.</div></div>
    </div>

    <!-- Matching Tab (inclui Comparação como view toggle) -->
    <div id="tab-matching" class="tab-panel">
      <div id="matchingContent"><div class="empty-state">Carrega o BOM e adiciona fornecedores primeiro.</div></div>
    </div>

    <!-- Instalação Tab -->
    <div id="tab-install" class="tab-panel">
      <div class="section-header">
        <span class="section-tag">Custos de Instalação / Técnicos / Serviços</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="generateReport()"><i data-lucide="file-text" style="width:13px;height:13px;stroke-width:1.75;vertical-align:middle"></i> Relatório</button>
          <button class="btn btn-primary btn-sm" onclick="generateExcel()">↓ Gerar Excel</button>
        </div>
      </div>
      <div id="install-content"></div>
    </div>

  </div>
</div>

<!-- hidden file input for quotation upload (shared) -->
<input type="file" id="quotFileInput" accept=".xlsx,.xls,.pdf" style="display:none" onchange="handleQuotationUpload(this)">

<div id="toast"></div>
<div id="modalRoot"></div>

<script src="js/process-core.js"></script>
<script src="js/process-bom.js"></script>
<script src="js/process-suppliers.js"></script>
<script src="js/process-matching.js"></script>
<script src="js/process-install.js"></script>
<script src="js/process-excel.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => lucide.createIcons());</script>
</body>
</html>
