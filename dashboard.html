<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data:;">
<title>Procurement System — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@1.8.0/dist/umd/lucide.min.js" integrity="sha384-+8nbzwDAyu5kAjqtR/XKxIgPHQD2TflvbZgeDZn5t3JP+OOogNH1jXnfel8ZAgzS" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
<style>
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}
.chart-card-wide { grid-column: span 2; }
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.chart-title {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px;
  font-family: 'DM Mono', monospace;
}
.chart-wrap { position: relative; height: 200px; }
@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr 1fr; }
  .chart-card-wide { grid-column: span 2; }
}
@media (max-width: 600px) {
  .charts-grid { grid-template-columns: 1fr; }
  .chart-card-wide { grid-column: span 1; }
}
.followup-banner {
  background: rgba(251,191,36,.06);
  border: 1px solid rgba(251,191,36,.2);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 20px;
}
.followup-banner-header {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.followup-banner-title {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: #fbbf24; letter-spacing: .6px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.followup-count {
  background: rgba(251,191,36,.2); color: #fbbf24;
  border-radius: 10px; padding: 1px 8px;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700;
}
.followup-rows { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
.followup-row {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 7px 10px; background: rgba(251,191,36,.04);
  border: 1px solid rgba(251,191,36,.12); border-radius: 6px;
  cursor: pointer; transition: border-color .15s;
}
.followup-row:hover { border-color: rgba(251,191,36,.35); }
.followup-supplier { font-size: 13px; font-weight: 600; color: #fff; }
.followup-proc { font-size: 12px; color: var(--muted); }
.followup-overdue { font-family: 'DM Mono', monospace; font-size: 10px; color: #f87171; margin-left: auto; white-space: nowrap; }
.notif-bell { position:relative; cursor:pointer; padding:6px 8px; border-radius:6px; color:var(--muted); transition:.15s; display:inline-flex; align-items:center; }
.notif-bell:hover { color:var(--text); background:var(--surface2); }
.notif-badge { position:absolute; top:0; right:0; background:var(--danger); color:#fff; border-radius:8px; font-size:9px; font-family:'DM Mono',monospace; font-weight:700; padding:1px 5px; min-width:16px; text-align:center; line-height:1.4; }
.notif-panel { position:absolute; bottom:calc(100% + 8px); left:0; width:320px; background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.4); z-index:200; overflow:hidden; max-height:420px; overflow-y:auto; }
.notif-panel-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); }
.notif-panel-title { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:.6px; text-transform:uppercase; }
.notif-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:.12s; }
.notif-item:last-child { border-bottom:none; }
.notif-item:hover { background:var(--surface2); }
.notif-item.unread { background:rgba(37,99,235,.05); border-left:2px solid var(--accent); }
.notif-item-title { font-size:13px; color:#fff; margin-bottom:2px; }
.notif-item-body { font-size:12px; color:var(--muted); }
.notif-item-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:4px; }
.notif-empty { padding:24px 16px; text-align:center; color:var(--muted); font-size:13px; }
.tag-input-box { display:flex; flex-wrap:wrap; gap:5px; align-items:center; border:1px solid var(--border); border-radius:6px; padding:5px 8px; min-height:36px; background:var(--surface2); cursor:text; }
.tag-chip { display:inline-flex; align-items:center; gap:4px; background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.3); color:#a5b4fc; border-radius:4px; padding:2px 7px; font-size:12px; }
.tag-chip button { background:none; border:none; color:#a5b4fc; cursor:pointer; padding:0; font-size:13px; line-height:1; }
.tag-input-field { border:none; background:transparent; color:var(--text); font-size:13px; outline:none; min-width:120px; flex:1; }
</style>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="appSidebar"></aside>
  <div class="main-area">
    <div class="page-content">

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- User performance (admin only) -->
    <div id="userStatsSection" style="display:none"></div>

    <!-- Follow-up alerts -->
    <div id="followupBanner" style="display:none"></div>

    <!-- Charts -->
    <div id="chartsToggleRow" style="display:none;align-items:center;gap:8px;padding:10px 6px;cursor:pointer;color:var(--muted);border-bottom:1px solid var(--border);user-select:none;margin-bottom:4px">
      <span id="chartsArrow" style="font-size:10px">▶</span>
      <span style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.5px;text-transform:uppercase">Gráficos</span>
    </div>
    <div class="charts-grid" id="chartsSection" style="display:none">
      <div class="chart-card">
        <div class="chart-title">Por Estado</div>
        <div class="chart-wrap"><canvas id="chartStatus"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Por Prioridade</div>
        <div class="chart-wrap"><canvas id="chartPriority"></canvas></div>
      </div>
      <div class="chart-card chart-card-wide">
        <div class="chart-title">Processos criados (últimos 3 meses, por quinzena)</div>
        <div class="chart-wrap"><canvas id="chartTrend"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Top Fornecedores</div>
        <div class="chart-wrap"><canvas id="chartSuppliers"></canvas></div>
      </div>
    </div>

    <!-- Filter + actions bar -->
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Pesquisar cliente ou projeto..." style="max-width:280px">
      <select id="filterStatus" style="max-width:180px">
        <option value="">Todos os estados</option>
        <option>Active</option>
        <option>Waiting for suppliers</option>
        <option>Waiting for internal info</option>
        <option>Partial responses</option>
        <option>Ready for Excel</option>
        <option>Closed</option>
        <option>Cancelled</option>
      </select>
      <select id="filterPriority" style="max-width:140px">
        <option value="">Todas prioridades</option>
        <option>Urgent</option>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>
      <div style="margin-left:auto">
        <button class="btn btn-primary" id="createProcessBtn">+ Novo Processo</button>
      </div>
    </div>

    <!-- Process list -->
    <div class="process-table-header">
      <span>Projeto / Cliente</span>
      <span>Prioridade</span>
      <span>Estado</span>
      <span>Prazo</span>
      <span>Responsável</span>
      <span></span>
    </div>
    <div id="processList"></div>

    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal root -->
<div id="modalRoot"></div>

<script src="js/dashboard-page.js"></script>
</body>
</html>
