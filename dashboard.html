<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data:;">
<title>Procurement System — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}
.chart-card-wide { grid-column: span 2; }
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.chart-title {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px;
  font-family: 'DM Mono', monospace;
}
.chart-wrap { position: relative; height: 200px; }
@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr 1fr; }
  .chart-card-wide { grid-column: span 2; }
}
@media (max-width: 600px) {
  .charts-grid { grid-template-columns: 1fr; }
  .chart-card-wide { grid-column: span 1; }
}
.followup-banner {
  background: rgba(251,191,36,.06);
  border: 1px solid rgba(251,191,36,.2);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 20px;
}
.followup-banner-header {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.followup-banner-title {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: #fbbf24; letter-spacing: .6px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.followup-count {
  background: rgba(251,191,36,.2); color: #fbbf24;
  border-radius: 10px; padding: 1px 8px;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700;
}
.followup-rows { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
.followup-row {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 7px 10px; background: rgba(251,191,36,.04);
  border: 1px solid rgba(251,191,36,.12); border-radius: 6px;
  cursor: pointer; transition: border-color .15s;
}
.followup-row:hover { border-color: rgba(251,191,36,.35); }
.followup-supplier { font-size: 13px; font-weight: 600; color: #fff; }
.followup-proc { font-size: 12px; color: var(--muted); }
.followup-overdue { font-family: 'DM Mono', monospace; font-size: 10px; color: #f87171; margin-left: auto; white-space: nowrap; }
.notif-bell { position:relative; cursor:pointer; padding:6px 8px; border-radius:6px; color:var(--muted); transition:.15s; display:inline-flex; align-items:center; }
.notif-bell:hover { color:var(--text); background:var(--surface2); }
.notif-badge { position:absolute; top:0; right:0; background:var(--danger); color:#fff; border-radius:8px; font-size:9px; font-family:'DM Mono',monospace; font-weight:700; padding:1px 5px; min-width:16px; text-align:center; line-height:1.4; }
.notif-panel { position:absolute; top:calc(100% + 8px); right:0; width:320px; background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.4); z-index:200; overflow:hidden; max-height:420px; overflow-y:auto; }
.notif-panel-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); }
.notif-panel-title { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:.6px; text-transform:uppercase; }
.notif-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:.12s; }
.notif-item:last-child { border-bottom:none; }
.notif-item:hover { background:var(--surface2); }
.notif-item.unread { background:rgba(59,130,246,.05); border-left:2px solid var(--accent); }
.notif-item-title { font-size:13px; color:#fff; margin-bottom:2px; }
.notif-item-body { font-size:12px; color:var(--muted); }
.notif-item-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:4px; }
.notif-empty { padding:24px 16px; text-align:center; color:var(--muted); font-size:13px; }
.tag-input-box { display:flex; flex-wrap:wrap; gap:5px; align-items:center; border:1px solid var(--border); border-radius:6px; padding:5px 8px; min-height:36px; background:var(--surface2); cursor:text; }
.tag-chip { display:inline-flex; align-items:center; gap:4px; background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.3); color:#a5b4fc; border-radius:4px; padding:2px 7px; font-size:12px; }
.tag-chip button { background:none; border:none; color:#a5b4fc; cursor:pointer; padding:0; font-size:13px; line-height:1; }
.tag-input-field { border:none; background:transparent; color:var(--text); font-size:13px; outline:none; min-width:120px; flex:1; }
</style>
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
</head>
<body>

<div class="app-shell">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">Triana · <span>Procurement</span></div>
    <div class="topbar-right" id="topbarRight"></div>
  </div>

  <!-- Page -->
  <div class="page-content">

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Follow-up alerts -->
    <div id="followupBanner" style="display:none"></div>

    <!-- Charts -->
    <div class="charts-grid" id="chartsSection" style="display:none">
      <div class="chart-card">
        <div class="chart-title">Por Estado</div>
        <div class="chart-wrap"><canvas id="chartStatus"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Por Prioridade</div>
        <div class="chart-wrap"><canvas id="chartPriority"></canvas></div>
      </div>
      <div class="chart-card chart-card-wide">
        <div class="chart-title">Processos criados (últimos 6 meses)</div>
        <div class="chart-wrap"><canvas id="chartTrend"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Top Fornecedores</div>
        <div class="chart-wrap"><canvas id="chartSuppliers"></canvas></div>
      </div>
    </div>

    <!-- Filter + actions bar -->
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Pesquisar cliente ou projeto..." oninput="renderList()" style="max-width:280px">
      <select id="filterStatus" onchange="renderList()" style="max-width:180px">
        <option value="">Todos os estados</option>
        <option>Active</option>
        <option>Waiting for suppliers</option>
        <option>Waiting for internal info</option>
        <option>Partial responses</option>
        <option>Ready for Excel</option>
        <option>Closed</option>
        <option>Cancelled</option>
      </select>
      <select id="filterPriority" onchange="renderList()" style="max-width:140px">
        <option value="">Todas prioridades</option>
        <option>Urgent</option>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="filterMine" onchange="renderList()"> Meus processos
      </label>
      <div style="margin-left:auto">
        <button class="btn btn-primary" onclick="openCreateModal()">+ Novo Processo</button>
      </div>
    </div>

    <!-- Process list -->
    <div class="process-table-header">
      <span>Projeto / Cliente</span>
      <span>Prioridade</span>
      <span>Estado</span>
      <span>Prazo</span>
      <span>Responsável</span>
      <span></span>
    </div>
    <div id="processList"></div>

  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal root -->
<div id="modalRoot"></div>

<script>
let allProcesses = [];
let procUsers = [];
let _notifications = [];
let _notifOpen = false;
let _overdueCount = 0;

// ── Notifications ──
async function loadNotifications() {
  _notifications = await API.getMyNotifications();
  const unread = _notifications.filter(n => !n.read).length;
  const badge = document.getElementById('notifBadge');
  if (badge) { badge.textContent = unread; badge.style.display = unread ? '' : 'none'; }
}

function toggleNotifPanel() {
  _notifOpen = !_notifOpen;
  const wrap = document.getElementById('notifWrap');
  document.getElementById('notifPanel')?.remove();
  if (!_notifOpen) return;
  const unread = _notifications.filter(n => !n.read);
  const items = _notifications.length
    ? _notifications.map(n => `<div class="notif-item${n.read?'':' unread'}" onclick="goNotif('${n.process_id||''}')">
        <div class="notif-item-title">${esc(n.title)}</div>
        ${n.body ? `<div class="notif-item-body">${esc(n.body)}</div>` : ''}
        <div class="notif-item-time">${timeAgoNotif(n.created_at)}</div>
      </div>`).join('')
    : `<div class="notif-empty">Sem notificações.</div>`;
  wrap.insertAdjacentHTML('beforeend', `<div class="notif-panel" id="notifPanel">
    <div class="notif-panel-header">
      <span class="notif-panel-title">Notificações</span>
      ${unread.length ? `<button class="btn btn-ghost btn-sm" onclick="markAllRead()">Marcar lidas</button>` : ''}
    </div>${items}</div>`);
  if (unread.length) markAllRead();
  setTimeout(() => document.addEventListener('click', closeNotifOutside, { once: true }), 0);
}

function closeNotifOutside(e) {
  if (!document.getElementById('notifPanel')?.contains(e.target) &&
      !document.getElementById('notifWrap')?.contains(e.target)) {
    document.getElementById('notifPanel')?.remove();
    _notifOpen = false;
  }
}

async function markAllRead() {
  try {
    await API.markNotificationsRead();
    _notifications = _notifications.map(n => ({ ...n, read: true }));
    const badge = document.getElementById('notifBadge');
    if (badge) badge.style.display = 'none';
    // refresh panel items to remove unread style
    const panel = document.getElementById('notifPanel');
    if (panel) panel.querySelectorAll('.notif-item.unread').forEach(el => el.classList.remove('unread'));
    const hdr = panel?.querySelector('.notif-panel-header button');
    if (hdr) hdr.remove();
  } catch(_) {}
}

function goNotif(processId) {
  document.getElementById('notifPanel')?.remove();
  _notifOpen = false;
  if (processId && UUID_RE.test(processId)) window.location.href = `process.html?id=${processId}`;
}

function timeAgoNotif(d) {
  if (!d) return '';
  const diff = Math.floor((Date.now() - new Date(d)) / 60000);
  if (diff < 1) return 'agora';
  if (diff < 60) return `${diff}m atrás`;
  if (diff < 1440) return `${Math.floor(diff/60)}h atrás`;
  return `${Math.floor(diff/1440)}d atrás`;
}

// ── Init ──
window.addEventListener('load', async () => {
  const auth = await requireAuth('index.html');
  if (!auth) return;
  const adminLink = hasRole('admin')
    ? `<a href="admin.html" class="btn btn-ghost btn-sm" style="margin-right:4px;border-color:rgba(16,185,129,.3);color:#34d399">Admin</a>`
    : '';
  const pricesLink = !hasRole('commercial')
    ? `<a href="prices.html" class="btn btn-ghost btn-sm" style="margin-right:4px">Preços</a>` +
      `<a href="suppliers.html" class="btn btn-ghost btn-sm" style="margin-right:4px">Fornecedores</a>`
    : '';
  document.getElementById('topbarRight').innerHTML =
    `<div style="position:relative;display:inline-flex;margin-right:4px" id="notifWrap">
      <div class="notif-bell" onclick="toggleNotifPanel()" title="Notificações">🔔<span class="notif-badge" id="notifBadge" style="display:none"></span></div>
    </div>` + pricesLink + adminLink + renderUserChip();
  let topSuppliers = [];
  [procUsers, allProcesses] = await Promise.all([
    API.getProcurementUsers(),
    API.getProcesses(),
  ]);
  renderStats();
  renderList();
  try { topSuppliers = await API.getTopSuppliers(); } catch(_) {}
  renderCharts(allProcesses, topSuppliers);
  if (!hasRole('commercial')) {
    try { renderFollowupAlerts(await API.getOverdueFollowups()); } catch(_) {}
  }
  try { await loadNotifications(); } catch(_) {}
});

async function loadProcesses() {
  try {
    allProcesses = await API.getProcesses();
    renderStats(); renderList();
  } catch(e) { showToast('Erro ao carregar processos: ' + e.message, true); }
}

// ── Charts ──
let _charts = {};
function renderCharts(processes, topSuppliers) {
  if (typeof Chart === 'undefined') return;
  if (!processes.length && !topSuppliers.length) return;
  document.getElementById('chartsSection').style.display = '';

  Chart.defaults.color = '#64748b';
  Chart.defaults.borderColor = '#1a2235';
  Chart.defaults.font.family = "'Figtree', sans-serif";

  const statuses = ['Active','Waiting for suppliers','Waiting for internal info','Partial responses','Ready for Excel','Closed','Cancelled'];
  const statusColors = ['#3b82f6','#f59e0b','#22d3ee','#10b981','#7c3aed','#64748b','#f87171'];
  const statusCounts = statuses.map(s => processes.filter(p => p.status === s).length);

  const priorities = ['Low','Medium','High','Urgent'];
  const priorityColors = ['#475569','#3b82f6','#f59e0b','#f87171'];
  const priorityCounts = priorities.map(pr => processes.filter(p => p.priority === pr).length);

  // Monthly trend — last 6 months
  const now = new Date();
  const months = Array.from({ length: 6 }, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
    return { label: d.toLocaleString('pt-PT', { month: 'short', year: '2-digit' }), year: d.getFullYear(), month: d.getMonth() };
  });
  const trendCounts = months.map(m =>
    processes.filter(p => { const d = new Date(p.created_at); return d.getFullYear() === m.year && d.getMonth() === m.month; }).length
  );

  function destroyChart(id) { if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }

  // Chart 1 — Donut: por estado
  destroyChart('status');
  _charts.status = new Chart(document.getElementById('chartStatus'), {
    type: 'doughnut',
    data: { labels: statuses, datasets: [{ data: statusCounts, backgroundColor: statusColors, borderWidth: 0, hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 11 }, padding: 10 } } },
    },
  });

  // Chart 2 — Bar: por prioridade
  destroyChart('priority');
  _charts.priority = new Chart(document.getElementById('chartPriority'), {
    type: 'bar',
    data: { labels: priorities, datasets: [{ data: priorityCounts, backgroundColor: priorityColors, borderRadius: 6, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { ticks: { stepSize: 1 }, grid: { color: '#1a2235' } } },
    },
  });

  // Chart 3 — Line: tendência mensal
  destroyChart('trend');
  _charts.trend = new Chart(document.getElementById('chartTrend'), {
    type: 'line',
    data: {
      labels: months.map(m => m.label),
      datasets: [{
        data: trendCounts,
        borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,.08)',
        fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#3b82f6',
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { ticks: { stepSize: 1 }, grid: { color: '#1a2235' }, beginAtZero: true } },
    },
  });

  // Chart 4 — Bar horizontal: top fornecedores
  destroyChart('suppliers');
  _charts.suppliers = new Chart(document.getElementById('chartSuppliers'), {
    type: 'bar',
    data: {
      labels: topSuppliers.map(s => s.name.length > 18 ? s.name.slice(0, 17) + '…' : s.name),
      datasets: [{ data: topSuppliers.map(s => s.count), backgroundColor: '#7c3aed', borderRadius: 6, borderSkipped: false }],
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { stepSize: 1 }, grid: { color: '#1a2235' }, beginAtZero: true }, y: { grid: { display: false } } },
    },
  });
}

// ── Follow-up Alerts ──
let followupCollapsed = false;
function renderFollowupAlerts(data) {
  _overdueCount = data.length;
  renderStats();
  const banner = document.getElementById('followupBanner');
  if (!data.length) { banner.style.display = 'none'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const rows = data.map(s => {
    const proc = s.processes;
    const due = new Date(s.next_followup_at);
    const days = Math.round((today - due) / 86400000);
    const label = days === 0 ? 'hoje' : `${days}d em atraso`;
    return `<div class="followup-row" onclick="window.location.href='process.html?id=${esc(proc?.id||'')}'">
      <span class="followup-supplier">${esc(s.name)}</span>
      <span class="followup-proc">${esc(proc?.project_name||'')}${proc?.client_name ? ' · ' + esc(proc.client_name) : ''}</span>
      <span class="followup-overdue">${label}</span>
    </div>`;
  }).join('');
  banner.style.display = '';
  banner.innerHTML = `<div class="followup-banner">
    <div class="followup-banner-header" onclick="followupCollapsed=!followupCollapsed;document.getElementById('followupRows').style.display=followupCollapsed?'none':''">
      <div class="followup-banner-title">⚠ Follow-ups em atraso <span class="followup-count">${data.length}</span></div>
      <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">▾</span>
    </div>
    <div class="followup-rows" id="followupRows">${rows}</div>
  </div>`;
}

// ── Stats ──
function renderStats() {
  const total    = allProcesses.length;
  const active   = allProcesses.filter(p => p.status === 'Active').length;
  const waiting  = allProcesses.filter(p => p.status === 'Waiting for suppliers' || p.status === 'Waiting for internal info').length;
  const ready    = allProcesses.filter(p => p.status === 'Ready for Excel').length;
  const urgent   = allProcesses.filter(p => p.priority === 'Urgent').length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card" onclick="setFilter('')">
      <div class="stat-number">${total}</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card" onclick="setFilter('Active')">
      <div class="stat-number" style="color:var(--accent)">${active}</div>
      <div class="stat-label">Ativos</div>
    </div>
    <div class="stat-card" onclick="setFilter('Waiting for internal info')">
      <div class="stat-number" style="color:#4fc3f7">${waiting}</div>
      <div class="stat-label">A aguardar</div>
    </div>
    <div class="stat-card" onclick="setFilter('Ready for Excel')">
      <div class="stat-number" style="color:var(--accent)">${ready}</div>
      <div class="stat-label">Prontos Excel</div>
    </div>
    <div class="stat-card" onclick="setFilterPriority('Urgent')">
      <div class="stat-number" style="color:var(--danger)">${urgent}</div>
      <div class="stat-label">Urgentes</div>
    </div>
    <div class="stat-card" onclick="document.getElementById('followupBanner').scrollIntoView({behavior:'smooth'})" style="cursor:${_overdueCount>0?'pointer':'default'}">
      <div class="stat-number" style="color:${_overdueCount>0?'#fbbf24':'var(--muted)'}">${_overdueCount}</div>
      <div class="stat-label">Follow-ups</div>
    </div>
  `;
}

function setFilter(val) {
  document.getElementById('filterStatus').value = val;
  renderList();
}
function setFilterPriority(val) {
  document.getElementById('filterPriority').value = val;
  renderList();
}

// ── Process list ──
const PRIORITY_ORDER = { Urgent: 0, High: 1, Medium: 2, Low: 3 };

function renderList() {
  const q  = document.getElementById('searchInput').value.toLowerCase().trim();
  const fs = document.getElementById('filterStatus').value;
  const fp = document.getElementById('filterPriority').value;

  let list = [...allProcesses];
  if (q)  list = list.filter(p => p.client_name?.toLowerCase().includes(q) || p.project_name?.toLowerCase().includes(q));
  if (fs) list = list.filter(p => p.status === fs);
  if (fp) list = list.filter(p => p.priority === fp);
  if (document.getElementById('filterMine')?.checked) list = list.filter(p => p.assigned_to === currentUser.id);

  list.sort((a, b) => (PRIORITY_ORDER[a.priority] ?? 2) - (PRIORITY_ORDER[b.priority] ?? 2) || new Date(a.deadline||'9999') - new Date(b.deadline||'9999'));

  const el = document.getElementById('processList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state">Sem processos encontrados.<br>Clica em "+ Novo Processo" para começar.</div>`;
    return;
  }

  el.innerHTML = `<div class="process-list">${list.map(p => `
    <div class="process-row" onclick="goToProcess('${p.id}')">
      <div>
        <div class="process-name">${esc(p.project_name)}</div>
        <div class="process-client">${esc(p.client_name)}</div>
      </div>
      <span class="priority-${(p.priority||'medium').toLowerCase()}" style="font-family:'DM Mono',monospace;font-size:12px">${p.priority||'Medium'}</span>
      <span class="badge ${statusBadgeClass(p.status)}">${p.status||'Active'}</span>
      <span class="deadline-chip ${deadlineClass(p.deadline)}">${p.deadline ? fmtDate(p.deadline) : '—'}</span>
      ${p.assignee ? `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);border-radius:4px;padding:2px 9px">${esc(p.assignee.name)}</span>` : '<span style="font-size:11px;color:var(--muted)">—</span>'}
      <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openCreateModal('${p.id}')">Editar</button>
        <button class="btn btn-ghost btn-sm" onclick="openCloneModal('${p.id}')">Clone</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete('${p.id}')">×</button>
      </div>
    </div>`).join('')}</div>`;
}

const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;

function goToProcess(id) {
  if (!UUID_RE.test(id)) return;
  window.location.href = `process.html?id=${id}`;
}

// ── Process tag input (categories) ──
let _pendingProcCats = null; // alias — same as pendingProcessCategories
function renderProcTagBox(boxId, arr) {
  const box = document.getElementById(boxId);
  if (!box) return;
  while (box.firstChild) box.removeChild(box.firstChild);
  arr.forEach((c, i) => {
    const span = document.createElement('span');
    span.className = 'tag-chip';
    span.textContent = c;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = '\u00d7';
    btn.onclick = () => removeProcTag(boxId, i);
    span.appendChild(btn);
    box.appendChild(span);
  });
  const inp = document.createElement('input');
  inp.className = 'tag-input-field';
  inp.placeholder = 'Adicionar, Enter para confirmar...';
  inp.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = this.value.trim().replace(/,/g, '');
      if (!val || pendingProcessCategories.includes(val)) return;
      pendingProcessCategories.push(val);
      renderProcTagBox(boxId, pendingProcessCategories);
      document.querySelector('#' + boxId + ' .tag-input-field')?.focus();
    }
  };
  box.appendChild(inp);
}
function removeProcTag(boxId, idx) {
  pendingProcessCategories.splice(idx, 1);
  renderProcTagBox(boxId, pendingProcessCategories);
}

// ── Create / Edit modal ──
let editingProcessId = null;
let pendingProcessCategories = [];

function openCreateModal(id = null) {
  if (id && !UUID_RE.test(id)) return;
  editingProcessId = id;
  const p = id ? allProcesses.find(x => x.id === id) : null;
  pendingProcessCategories = p ? [...(p.categories || [])] : [];
  showModal(`
    <div class="modal-tag">${p ? 'Editar Processo' : 'Novo Processo'}</div>
    <div class="modal-title">${p ? esc(p.project_name) : 'Criar Processo'}</div>
    <div class="form-grid-2">
      <div><label>Nome do Cliente</label><input id="f_client" value="${esc(p?.client_name||'')}" placeholder="Ex: Banco BCI"></div>
      <div><label>Nome do Projeto</label><input id="f_project" value="${esc(p?.project_name||'')}" placeholder="Ex: Upgrade Server Room"></div>
    </div>
    <div class="form-grid-2">
      <div><label>Deadline</label><input type="date" id="f_deadline" value="${p?.deadline||''}"></div>
      <div><label>Prioridade</label>
        <select id="f_priority">
          ${['Low','Medium','High','Urgent'].map(v => `<option ${(p?.priority||'Medium')===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
    </div>
    ${p ? `<div class="form-row"><label>Estado</label>
      <select id="f_status">
        ${['Active','Waiting for suppliers','Waiting for internal info','Partial responses','Ready for Excel','Closed','Cancelled'].map(v=>`<option ${p.status===v?'selected':''}>${v}</option>`).join('')}
      </select></div>` : ''}
    ${(() => {
      if (hasRole('admin')) {
        return `<div class="form-row"><label>Responsável</label>
          <select id="f_assigned">
            <option value="">Não atribuído</option>
            ${procUsers.map(u => `<option value="${u.id}" ${p?.assigned_to===u.id?'selected':''}>${esc(u.name||'')}</option>`).join('')}
          </select></div>`;
      }
      if (p) {
        const waited12h = !p.assigned_to && (Date.now() - new Date(p.created_at)) > 12 * 60 * 60 * 1000;
        if (waited12h) {
          return `<div class="form-row"><label>Responsável</label>
            <select id="f_assigned">
              <option value="">Não atribuído</option>
              <option value="${currentUser.id}">Eu (${esc(currentProfile?.name || '')})</option>
            </select></div>`;
        }
        if (p.assigned_to) {
          const assignee = procUsers.find(u => u.id === p.assigned_to);
          return `<input type="hidden" id="f_assigned" value="${esc(p.assigned_to)}">`;
        }
        return `<input type="hidden" id="f_assigned" value=""><div class="form-row" style="font-size:12px;color:var(--muted)">Responsável: <em>Não atribuído — auto-atribuição disponível após 12h</em></div>`;
      }
      return `<input type="hidden" id="f_assigned" value="">`;
    })()}
    <div class="form-row"><label>Categorias <span style="font-size:11px;color:var(--muted);font-weight:400">(tipo de projeto — opcional)</span></label><div class="tag-input-box" id="f_catBox"></div></div>
    <div class="form-row"><label>Notas</label><textarea id="f_notes" placeholder="Observações...">${esc(p?.notes||'')}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProcess()">Guardar</button>
    </div>
  `);
  renderProcTagBox('f_catBox', pendingProcessCategories);
}

async function saveProcess() {
  const fields = {
    client_name:  document.getElementById('f_client').value.trim(),
    project_name: document.getElementById('f_project').value.trim(),
    deadline:     document.getElementById('f_deadline').value || null,
    priority:     document.getElementById('f_priority').value,
    notes:        document.getElementById('f_notes').value.trim(),
    categories:   pendingProcessCategories,
  };
  const statusEl = document.getElementById('f_status');
  if (statusEl) fields.status = statusEl.value;
  fields.assigned_to = document.getElementById('f_assigned').value || null;
  if (fields.status === 'Closed') {
    const prev = editingProcessId ? allProcesses.find(x => x.id === editingProcessId) : null;
    if (!prev || prev.status !== 'Closed') fields.closed_at = new Date().toISOString();
  }

  // Auto-status: no assignee → waiting; newly assigned → active
  if (!editingProcessId) {
    if (!fields.assigned_to) fields.status = 'Waiting for internal info';
  } else {
    const prev = allProcesses.find(x => x.id === editingProcessId);
    if (!prev?.assigned_to && fields.assigned_to && !statusEl) {
      fields.status = 'Active';
    }
  }

  if (!fields.client_name || !fields.project_name) { showToast('Cliente e Projeto são obrigatórios.', true); return; }
  if (fields.client_name.length > 200 || fields.project_name.length > 200) { showToast('Nome demasiado longo (máx 200 caracteres).', true); return; }
  if (fields.notes && fields.notes.length > 5000) { showToast('Notas demasiado longas (máx 5000 caracteres).', true); return; }
  if (fields.assigned_to && !UUID_RE.test(fields.assigned_to)) { showToast('Erro interno: ID de utilizador inválido.', true); return; }
  if (!hasRole('admin') && fields.assigned_to && fields.assigned_to !== currentUser.id) { showToast('Não tens permissão para atribuir a outro utilizador.', true); return; }

  try {
    if (editingProcessId) {
      const prevProc = allProcesses.find(x => x.id === editingProcessId);
      await API.updateProcess(editingProcessId, fields);
      showToast('Processo atualizado.');
      if (fields.assigned_to && fields.assigned_to !== (prevProc?.assigned_to || null) && fields.assigned_to !== currentUser.id) {
        try { await API.createNotification(fields.assigned_to, 'Processo atribuído', `Foste atribuído a "${fields.project_name}"`, editingProcessId); } catch(_) {}
      }
    } else {
      const proc = await API.createProcess(fields);
      showToast('Processo criado.');
      closeModal();
      await loadProcesses();
      // Go to process detail to upload BOM
      window.location.href = `process.html?id=${proc.id}&new=1`;
      return;
    }
    closeModal();
    await loadProcesses();
  } catch(e) { showToast('Erro: ' + e.message, true); }
}

async function confirmDelete(id) {
  if (!UUID_RE.test(id)) return;
  const p = allProcesses.find(x => x.id === id);
  showModal(`
    <div class="modal-tag">Confirmar</div>
    <div class="modal-title">Apagar Processo</div>
    <div style="color:var(--muted);font-size:14px;margin-bottom:24px">Apagar "<strong style="color:#fff">${esc(p?.project_name)}</strong>"? Esta ação não pode ser desfeita.</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="doDelete('${id}')">Apagar</button>
    </div>
  `);
}

async function doDelete(id) {
  if (!UUID_RE.test(id)) return;
  try {
    await API.deleteProcess(id);
    closeModal();
    showToast('Processo apagado.');
    await loadProcesses();
  } catch(e) { showToast('Erro: ' + e.message, true); }
}

// ── Clone ──
function openCloneModal(id) {
  if (!UUID_RE.test(id)) return;
  const p = allProcesses.find(x => x.id === id);
  showModal(`
    <div class="modal-tag">Clonar Processo</div>
    <div class="modal-title">Duplicar "${esc(p.project_name)}"</div>
    <div class="form-grid-2">
      <div><label>Nome do Projeto</label><input id="cl_project" value="${esc(p.project_name)} [Clone]"></div>
      <div><label>Cliente</label><input id="cl_client" value="${esc(p.client_name)}"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin:16px 0">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px;color:var(--text)">
        <input type="checkbox" id="cl_bom" checked onchange="updateCloneUI()"> Copiar itens do BOM
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px;color:var(--text)">
        <input type="checkbox" id="cl_sup" checked onchange="updateCloneUI()"> Copiar fornecedores
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px;color:var(--text)" id="cl_quot_row">
        <input type="checkbox" id="cl_quot" checked> Copiar cotações e preços
      </label>
    </div>
    <div class="form-row" style="margin-top:4px">
      <label>Responsável (opcional)</label>
      <select id="cl_assigned">
        <option value="">Não atribuído</option>
        ${procUsers.map(u => `<option value="${u.id}" ${p?.assigned_to===u.id?'selected':''}>${esc(u.name||'')}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="doClone('${id}')">Clonar</button>
    </div>
  `);
}

function updateCloneUI() {
  const supChecked = document.getElementById('cl_sup').checked;
  const quotRow = document.getElementById('cl_quot_row');
  const quotCb  = document.getElementById('cl_quot');
  quotRow.style.opacity       = supChecked ? '1' : '.35';
  quotRow.style.pointerEvents = supChecked ? '' : 'none';
  if (!supChecked) quotCb.checked = false;
}

async function doClone(sourceId) {
  if (!UUID_RE.test(sourceId)) return;
  const project_name   = document.getElementById('cl_project').value.trim();
  const client_name    = document.getElementById('cl_client').value.trim();
  const copyBom        = document.getElementById('cl_bom').checked;
  const copySuppliers  = document.getElementById('cl_sup').checked;
  const copyQuotations = document.getElementById('cl_quot').checked;

  if (!project_name || !client_name) { showToast('Preenche nome e cliente.', true); return; }
  if (project_name.length > 200 || client_name.length > 200) { showToast('Nome demasiado longo.', true); return; }

  const src = allProcesses.find(x => x.id === sourceId);
  const fields = {
    project_name,
    client_name,
    priority: src.priority || 'Medium',
    status:   'Active',
    notes:    src.notes || null,
    deadline: null,
    assigned_to: document.getElementById('cl_assigned').value || null,
  };

  try {
    const newProc = await API.cloneProcess(sourceId, fields, { copyBom, copySuppliers, copyQuotations });
    closeModal();
    showToast('Processo clonado.');
    window.location.href = `process.html?id=${newProc.id}`;
  } catch(e) { showToast('Erro ao clonar: ' + e.message, true); }
}

// ── Modal helpers ──
function showModal(html) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box">${html}</div></div>`;
}
function closeModal() {
  document.getElementById('modalRoot').innerHTML = '';
}

// ── Helpers ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d) { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('pt-PT'); }
function deadlineClass(d) {
  if (!d) return '';
  const diff = (new Date(d) - new Date()) / 86400000;
  if (diff < 0) return 'overdue';
  if (diff < 5) return 'soon';
  return '';
}
function statusBadgeClass(s) {
  const map = {
    'Active':'badge-active','Waiting for suppliers':'badge-waiting','Waiting for internal info':'badge-waiting',
    'Partial responses':'badge-partial','Ready for Excel':'badge-ready','Closed':'badge-closed','Cancelled':'badge-cancelled'
  };
  return map[s] || 'badge-active';
}
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = isError ? 'var(--danger)' : 'var(--text)';
  el.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--accent)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
